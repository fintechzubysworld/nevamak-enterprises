<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #0a3d62, #3c6382); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 16px; }
        .card { background: white; max-width: 500px; width: 100%; padding: 24px 20px; border-radius: 32px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        h1 { color: #0a3d62; margin: 0 0 5px; font-size: 1.8rem; text-align: center; }
        .sub { color: #555; margin-bottom: 25px; font-size: 0.9rem; text-align: center; }
        input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 1px solid #ccc; border-radius: 48px; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #0a3d62; color: white; border: none; border-radius: 48px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 12px; }
        button:hover { background: #1e3799; }
        .error { color: #e74c3c; margin-top: 12px; text-align: center; font-size: 0.9rem; }
        .info { color: #27ae60; text-align: center; margin-top: 12px; font-size: 0.85rem; }
        .setup-btn { background: #e67e22; }
        .setup-btn:hover { background: #d35400; }
        .forgot-link { display: block; text-align: center; margin-top: 12px; color: #0a3d62; text-decoration: underline; cursor: pointer; font-size: 0.9rem; }
        .forgot-link:hover { color: #1e3799; }
        .help-text { font-size: 0.8rem; color: #888; text-align: center; margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px; }
        .verify-link { display: block; text-align: center; margin-top: 8px; color: #e67e22; cursor: pointer; font-size: 0.85rem; }
        .verify-link:hover { text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🚛 NEVAMAK</h1>
    <div class="sub">Supply Chain Portal</div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Sign In</button>
    <div id="message" class="error"></div>
    <a id="forgotPasswordLink" class="forgot-link">🔑 Forgot Password?</a>
    <div id="verificationMessage" class="info" style="display:none;"></div>
    
    <!-- Admin Setup Container - hidden by default, shown if no admin exists -->
    <div id="setupAdminContainer" style="display:none;">
        <button id="setupAdminBtn" class="setup-btn">🔧 Create Default Admin</button>
        <div class="info" style="font-size:0.85rem; color:#666; margin-top:4px;">
            Only needed if no admin account exists. Creates admin@nevamak.com / admin123
        </div>
    </div>
    
    <div class="help-text">
        <small>If you haven't verified your email, check your inbox and click the verification link.</small>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==================== Check if admin exists ====================
    // This function tries to read the users collection; if it fails (permission denied),
    // we assume no admin exists and show the setup button.
    async function checkAdminExists() {
        const container = document.getElementById('setupAdminContainer');
        try {
            const snap = await db.collection('users').where('role', '==', 'admin').limit(1).get();
            container.style.display = snap.empty ? 'block' : 'none';
        } catch (err) {
            // If we can't read the collection (e.g., no security rules), 
            // we show the setup button as a fallback.
            console.warn('Could not check admin existence (permission denied or offline). Assuming no admin exists.');
            container.style.display = 'block';
        }
    }

    // Run the check, but catch any errors to avoid unhandled rejections.
    checkAdminExists().catch(err => {
        console.warn('Error in checkAdminExists:', err);
        document.getElementById('setupAdminContainer').style.display = 'block';
    });

    // ==================== Create Default Admin ====================
    document.getElementById('setupAdminBtn')?.addEventListener('click', async () => {
        const adminEmail = 'admin@nevamak.com';
        const adminPassword = 'admin123';
        const btn = document.getElementById('setupAdminBtn');
        const originalText = btn.textContent;
        btn.textContent = 'Creating...';
        btn.disabled = true;

        try {
            let uid;
            let user;
            try {
                const userCred = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                uid = userCred.user.uid;
                user = userCred.user;
                console.log('Admin user created');
                await user.sendEmailVerification();
                console.log('Verification email sent to admin.');
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    // Sign in to get UID
                    const userCred = await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
                    uid = userCred.user.uid;
                    user = userCred.user;
                    await auth.signOut();
                    console.log('Admin user already exists, got UID');
                } else {
                    throw err;
                }
            }
            // Create Firestore doc (or update if exists)
            await db.collection('users').doc(uid).set({
                email: adminEmail,
                role: 'admin',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                enabled: true,
                emailVerified: user?.emailVerified || false
            });
            alert('✅ Admin account is ready!\nEmail: admin@nevamak.com\nPassword: admin123\nA verification email has been sent. Please verify your email.\nYou can sign in after verification.');
            document.getElementById('setupAdminContainer').style.display = 'none';
        } catch (err) {
            console.error('Setup error:', err);
            alert('Error creating admin: ' + err.message);
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });

    // ==================== Login ====================
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        const verificationMsg = document.getElementById('verificationMessage');
        messageDiv.innerText = '';
        verificationMsg.style.display = 'none';
        verificationMsg.innerText = '';

        if (!email || !password) {
            messageDiv.innerText = 'Please enter email and password.';
            return;
        }

        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const user = userCred.user;
            // Check if email is verified
            if (!user.emailVerified) {
                // Show message and allow resend
                verificationMsg.style.display = 'block';
                verificationMsg.innerHTML = `⚠️ Your email (${email}) is not verified. Please check your inbox and click the verification link. 
                    <span id="resendVerification" style="color:#0a3d62; text-decoration:underline; cursor:pointer;">Resend verification email</span>`;
                document.getElementById('resendVerification')?.addEventListener('click', async () => {
                    try {
                        await user.sendEmailVerification();
                        verificationMsg.innerHTML = `✅ Verification email resent to ${email}. Please check your spam folder.`;
                    } catch (err) {
                        alert('Error resending: ' + err.message);
                    }
                });
                await auth.signOut();
                return;
            }

            // Get user role
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists) {
                // If admin email, auto-create doc
                if (email === 'admin@nevamak.com') {
                    await db.collection('users').doc(user.uid).set({
                        email: email,
                        role: 'admin',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        enabled: true,
                        emailVerified: true
                    });
                    // Re-fetch
                    const newDoc = await db.collection('users').doc(user.uid).get();
                    if (newDoc.exists) {
                        const role = newDoc.data().role;
                        redirectUser(role);
                        return;
                    }
                }
                await auth.signOut();
                messageDiv.innerText = 'User role not found. Please ask admin to create your account.';
                return;
            }
            const role = userDoc.data().role;
            redirectUser(role);
        } catch (err) {
            console.error('Login error:', err);
            let msg = err.message;
            if (err.code === 'auth/user-not-found') {
                msg = 'User not found. Please check your email or create an account.';
            } else if (err.code === 'auth/wrong-password') {
                msg = 'Incorrect password. Please try again.';
            } else if (err.code === 'auth/invalid-email') {
                msg = 'Invalid email format.';
            } else if (err.code === 'auth/too-many-requests') {
                msg = 'Too many failed attempts. Please try again later.';
            } else if (err.code === 'auth/configuration-not-found') {
                msg = 'Authentication not enabled. Please contact admin.';
            } else if (err.code === 'auth/user-disabled') {
                msg = 'This account has been disabled. Please contact admin.';
            }
            messageDiv.innerText = '❌ ' + msg;
        }
    });

    // ==================== Forgot Password ====================
    document.getElementById('forgotPasswordLink').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
            document.getElementById('message').innerText = 'Please enter your email address first.';
            return;
        }
        try {
            await auth.sendPasswordResetEmail(email);
            document.getElementById('message').innerHTML = `<span style="color:#27ae60;">✅ Password reset email sent to ${email}. Please check your inbox.</span>`;
        } catch (err) {
            console.error('Password reset error:', err);
            let msg = err.message;
            if (err.code === 'auth/user-not-found') {
                msg = 'No user found with this email address.';
            }
            document.getElementById('message').innerHTML = `<span style="color:#e74c3c;">❌ ${msg}</span>`;
        }
    });

    // ==================== Redirect helper ====================
    function redirectUser(role) {
        if (role === 'admin' || role === 'lagos_sender') {
            window.location.href = 'index.html';
        } else if (role === 'abuja_rep') {
            window.location.href = 'receive_abuja.html';
        } else if (role === 'ph_rep') {
            window.location.href = 'receive_ph.html';
        } else if (role === 'vendor' || role === 'external_vendor') {
            window.location.href = 'external_vendor.html';
        } else {
            alert('Unknown role: ' + role);
        }
    }

    // ==================== Auto-redirect if already logged in ====================
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    const role = userDoc.data().role;
                    redirectUser(role);
                }
            } catch (err) {
                console.warn('Auto-redirect error:', err);
            }
        }
    });

    // ==================== Allow Enter key on password field ====================
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });
</script>
</body>
</html>
