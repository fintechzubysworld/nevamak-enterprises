<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Email Client</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 12px; display: flex; flex-direction: column; height: 100vh; max-height: 100vh; }
        .container { max-width: 1200px; margin: auto; width: 100%; display: flex; flex-direction: column; flex: 1; }
        header { background: #0a3d62; color: white; padding: 10px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #3c6382; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; border: none; cursor: pointer; }
        .email-layout { display: flex; flex: 1; gap: 12px; min-height: 0; }
        .sidebar { background: white; border-radius: 20px; padding: 12px; width: 200px; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sidebar h3 { margin: 0 0 8px; font-size: 0.9rem; }
        .sidebar .nav-item { padding: 8px 12px; border-radius: 40px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .sidebar .nav-item:hover { background: #eef2f5; }
        .sidebar .nav-item.active { background: #d4e2f0; font-weight: 600; }
        .sidebar .nav-item .badge { background: #e74c3c; color: white; border-radius: 50%; padding: 0 6px; font-size: 0.7rem; margin-left: auto; }
        .main { background: white; border-radius: 20px; display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .email-header { padding: 10px 16px; border-bottom: 1px solid #ddd; font-weight: bold; background: #f8f9fa; border-radius: 20px 20px 0 0; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .email-header .actions button { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px 8px; border-radius: 40px; }
        .email-header .actions button:hover { background: #ddd; }
        .email-list { flex: 1; overflow-y: auto; padding: 8px; }
        .email-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
        .email-item:hover { background: #f8f9fa; }
        .email-item.unread { background: #f0f7ff; }
        .email-item .avatar { width: 32px; height: 32px; border-radius: 50%; background: #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; flex-shrink: 0; overflow: hidden; }
        .email-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .email-item .details { flex: 1; min-width: 0; }
        .email-item .details .from { font-weight: 600; font-size: 0.9rem; }
        .email-item .details .subject { font-size: 0.85rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-item .details .preview { font-size: 0.8rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-item .date { font-size: 0.7rem; color: #888; flex-shrink: 0; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 1.8rem; }
        .compose-form input, .compose-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 40px; font-size: 0.9rem; margin-bottom: 8px; }
        .compose-form textarea { border-radius: 16px; min-height: 120px; resize: vertical; }
        .compose-form .recipient-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .compose-form .recipient-group input { flex: 1; }
        .compose-form .file-preview-area { display: none; background: #f0f0f0; padding: 8px 12px; border-radius: 12px; margin: 8px 0; align-items: center; gap: 8px; flex-wrap: wrap; }
        .compose-form .file-preview-area.show { display: flex; }
        .compose-form .file-preview-area .file-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .compose-form .file-preview-area .file-info img { width: 40px; height: 40px; object-fit: cover; border-radius: 8px; background: #ddd; }
        .compose-form .file-preview-area .remove-file { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .compose-form .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
        .compose-form .actions button { padding: 8px 20px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #0a3d62; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #ccc; color: #333; }
        .email-view { padding: 16px; overflow-y: auto; flex: 1; }
        .email-view .meta { border-bottom: 1px solid #ddd; padding-bottom: 12px; margin-bottom: 12px; }
        .email-view .meta .from { font-weight: 600; }
        .email-view .meta .to { font-size: 0.9rem; color: #555; }
        .email-view .meta .date { font-size: 0.8rem; color: #888; }
        .email-view .body { white-space: pre-wrap; line-height: 1.5; }
        .email-view .attachments { margin-top: 12px; }
        .email-view .attachments a { display: inline-block; background: #eef2f5; padding: 4px 12px; border-radius: 40px; margin-right: 8px; text-decoration: none; color: #0a3d62; font-size: 0.85rem; }
        .drive-status { font-size: 0.7rem; display: flex; align-items: center; gap: 6px; }
        .drive-status button { background: none; border: none; color: #0a3d62; cursor: pointer; text-decoration: underline; font-size: 0.7rem; }
        .profile-avatar { width: 28px; height: 28px; border-radius: 50%; background: #3c6382; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; overflow: hidden; flex-shrink: 0; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .permission-error { background: #fde8e8; border-left: 4px solid #e74c3c; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 0.9rem; color: #721c24; }
        .permission-error a { color: #0a3d62; }
        @media (max-width: 768px) { .sidebar { width: 100%; max-height: 150px; flex-shrink: 0; } .email-layout { flex-direction: column; } .sidebar .nav-item { display: inline-block; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>✉️ NEVAMAK Mail</h1>
        <div class="nav-links">
            <div class="profile-avatar" id="headerAvatar" onclick="openProfileModal()" title="Profile">
                <span id="headerAvatarText">👤</span>
                <img id="headerAvatarImg" style="display:none;" />
            </div>
            <a href="index.html">🏠 Dashboard</a>
            <a href="reports.html">📊 Reports</a>
            <a href="picture_repo.html">🖼️ Pictures</a>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </header>

    <div class="email-layout">
        <div class="sidebar">
            <h3>📁 Folders</h3>
            <div class="nav-item active" data-folder="inbox" onclick="switchFolder('inbox')">
                📥 Inbox <span class="badge" id="inboxBadge">0</span>
            </div>
            <div class="nav-item" data-folder="sent" onclick="switchFolder('sent')">📤 Sent</div>
            <div class="nav-item" data-folder="drafts" onclick="switchFolder('drafts')">📝 Drafts</div>
            <div class="nav-item" style="margin-top:16px; background:#27ae60; color:white;" onclick="openCompose()">✏️ Compose</div>
            <div class="drive-status" style="margin-top:auto; padding-top:12px; border-top:1px solid #ddd;">
                <span id="driveStatusText">🔐 Drive</span>
                <button id="driveSignInBtn" onclick="signInToDrive()">Sign in</button>
            </div>
        </div>

        <div class="main">
            <div class="email-header">
                <span id="folderTitle">Inbox</span>
                <div class="actions">
                    <button onclick="refreshFolder()" title="Refresh">🔄</button>
                </div>
            </div>
            <div class="email-list" id="emailList">
                <div style="text-align:center; padding:40px; color:#888;">Loading...</div>
            </div>
        </div>
    </div>
</div>

<!-- Compose Modal -->
<div id="composeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('composeModal')">&times;</span>
        <h2>✏️ New Email</h2>
        <form class="compose-form" id="composeForm">
            <div class="recipient-group">
                <input type="text" id="composeTo" placeholder="To: internal username or external email" style="flex:1;">
                <select id="composeInternal" style="flex:1;">
                    <option value="">-- Internal users --</option>
                </select>
            </div>
            <input type="text" id="composeSubject" placeholder="Subject">
            <textarea id="composeBody" placeholder="Message"></textarea>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <button type="button" class="btn-secondary" id="attachBtn">📎 Attach</button>
                <input type="file" id="fileInput" style="display:none;" multiple>
                <span style="font-size:0.8rem; color:#888;" id="attachStatus">No file attached</span>
            </div>
            <div class="file-preview-area" id="filePreviewArea">
                <div class="file-info">
                    <img id="filePreviewThumb" src="" alt="file preview" />
                    <span class="name" id="filePreviewName">file.jpg</span>
                    <span class="size" id="filePreviewSize">0 KB</span>
                </div>
                <button class="remove-file" id="removeFileBtn" title="Remove file">✕</button>
            </div>
            <div style="margin-top:8px;">
                <label><input type="checkbox" id="composeExternal"> Send as external email (via EmailJS)</label>
            </div>
            <div class="actions">
                <button type="button" class="btn-secondary" onclick="saveDraft()">💾 Draft</button>
                <button type="submit" class="btn-primary">📤 Send</button>
            </div>
            <div id="composeMessage" style="color:red; margin-top:8px;"></div>
            <div id="permissionInfo" style="display:none;" class="permission-error"></div>
        </form>
    </div>
</div>

<!-- View Email Modal -->
<div id="viewEmailModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <span class="close" onclick="closeModal('viewEmailModal')">&times;</span>
        <div id="viewEmailContent"></div>
        <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn-secondary" onclick="deleteEmail()">🗑️ Delete</button>
            <button class="btn-primary" onclick="replyEmail()">↩️ Reply</button>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal profile-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('profileModal')">&times;</span>
        <h2 style="text-align:center;">Edit Profile</h2>
        <div style="text-align:center;">
            <div class="avatar-preview" id="profilePreview">
                <span id="previewText">👤</span>
                <img id="previewImg" style="display:none;" />
            </div>
            <div>
                <input type="file" id="profileFileInput" accept="image/*">
                <button class="btn-upload" onclick="document.getElementById('profileFileInput').click()">📷 Choose Photo</button>
            </div>
            <div style="margin-top:12px; text-align:left;">
                <p><strong>Name:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Role:</strong> <span id="profileRole"></span></p>
                <p><strong>Drive Status:</strong> <span id="profileDriveStatus"></span></p>
            </div>
            <button class="btn-save" id="profileSaveBtn" disabled>💾 Save Changes</button>
            <div id="profileMessage" style="color:red; margin-top:8px;"></div>
        </div>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==================== EmailJS Config ====================
    const EMAILJS_PUBLIC_KEY = 'uwDz5T65dSTM4RRJ3';
    const EMAILJS_SERVICE_ID = 'service_mpqnvxf';
    const EMAILJS_TEMPLATE_ID = 'template_hjum2aa';
    emailjs.init(EMAILJS_PUBLIC_KEY);

    // ==================== Google Drive Config ====================
    const DRIVE_FOLDER_ID = '1TjtzQiwAVLQ7ZPyDlBBNOq-xsbATAFwS';
    const CLIENT_ID = '442510200976-2iifvf15c8rha9jcie1mu46hbpv4l7ob.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient = null;
    let accessToken = null;
    let isDriveSignedIn = false;
    let driveInitialized = false;
    let currentUser = null;
    let currentUserId = "";
    let currentUserEmail = "";
    let currentFolder = 'inbox';
    let allUsers = [];
    let currentViewEmailId = null;
    let currentProfilePic = null;

    // ==================== DOM refs ====================
    const emailList = document.getElementById('emailList');
    const folderTitle = document.getElementById('folderTitle');
    const inboxBadge = document.getElementById('inboxBadge');
    const composeModal = document.getElementById('composeModal');
    const composeForm = document.getElementById('composeForm');
    const composeTo = document.getElementById('composeTo');
    const composeInternal = document.getElementById('composeInternal');
    const composeSubject = document.getElementById('composeSubject');
    const composeBody = document.getElementById('composeBody');
    const composeExternal = document.getElementById('composeExternal');
    const composeMessage = document.getElementById('composeMessage');
    const permissionInfo = document.getElementById('permissionInfo');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const filePreviewThumb = document.getElementById('filePreviewThumb');
    const filePreviewName = document.getElementById('filePreviewName');
    const filePreviewSize = document.getElementById('filePreviewSize');
    const removeFileBtn = document.getElementById('removeFileBtn');
    const attachStatus = document.getElementById('attachStatus');
    const viewModal = document.getElementById('viewEmailModal');
    const viewContent = document.getElementById('viewEmailContent');
    const driveStatusText = document.getElementById('driveStatusText');
    const driveSignInBtn = document.getElementById('driveSignInBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const headerAvatarText = document.getElementById('headerAvatarText');
    const headerAvatarImg = document.getElementById('headerAvatarImg');
    const profileModal = document.getElementById('profileModal');
    const previewImg = document.getElementById('previewImg');
    const previewText = document.getElementById('previewText');
    const profileFileInput = document.getElementById('profileFileInput');
    const profileSaveBtn = document.getElementById('profileSaveBtn');
    const profileMessage = document.getElementById('profileMessage');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const profileRole = document.getElementById('profileRole');
    const profileDriveStatus = document.getElementById('profileDriveStatus');

    let pendingFile = null;
    let unsubscribeFolder = null;

    // ==================== Google Drive OAuth ====================
    function initDriveClient() {
        if (typeof google === 'undefined' || !google.accounts) { setTimeout(initDriveClient, 1000); return; }
        if (driveInitialized) return;
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                if (tokenResponse.error) {
                    console.error('Drive token error:', tokenResponse);
                    driveStatusText.innerText = '🔴 Drive Error';
                    driveSignInBtn.style.display = 'inline';
                    return;
                }
                accessToken = tokenResponse.access_token;
                isDriveSignedIn = true;
                localStorage.setItem('drive_access_token', accessToken);
                localStorage.setItem('drive_token_expiry', Date.now() + 3600 * 1000);
                driveStatusText.innerText = '✅ Drive';
                driveSignInBtn.style.display = 'none';
                driveInitialized = true;
                if (pendingFile) {
                    const f = pendingFile;
                    pendingFile = null;
                    uploadAndAttachFile(f);
                }
                if (profileModal.style.display === 'flex') { profileDriveStatus.innerText = '✅ Connected'; }
            },
        });
        driveInitialized = true;
    }

    function signInToDrive() {
        if (!tokenClient) { initDriveClient(); if (!tokenClient) { alert('Google Drive not available.'); return; } }
        tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    function getDriveToken() {
        const stored = localStorage.getItem('drive_access_token');
        const expiry = parseInt(localStorage.getItem('drive_token_expiry') || '0');
        if (stored && expiry > Date.now()) {
            accessToken = stored;
            isDriveSignedIn = true;
            driveStatusText.innerText = '✅ Drive';
            driveSignInBtn.style.display = 'none';
            return accessToken;
        }
        if (accessToken) return accessToken;
        if (!isDriveSignedIn) {
            driveStatusText.innerText = '🔐 Drive';
            driveSignInBtn.style.display = 'inline';
        }
        return null;
    }

    async function uploadToDrive(file) {
        let token = getDriveToken();
        if (!token) {
            token = getDriveToken();
            if (!token) {
                driveStatusText.innerText = '🔐 Drive';
                driveSignInBtn.style.display = 'inline';
                throw new Error('Not signed in to Google Drive. Please click "Sign in".');
            }
        }
        const base64 = await readFileAsBase64(file);
        const metadata = { name: file.name, parents: [DRIVE_FOLDER_ID] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([base64], { type: 'application/octet-stream' }));

        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: form,
        });
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `HTTP ${response.status}`);
        }
        const data = await response.json();
        const viewUrl = `https://drive.google.com/uc?export=view&id=${data.id}`;
        return { fileId: data.id, viewUrl };
    }

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ==================== Auth ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        currentUserId = user.uid;
        currentUserEmail = user.email;
        initDriveClient();
        getDriveToken();
        await loadProfilePicture();
        await loadUsers();
        switchFolder('inbox');
        populateInternalUsers();
    });

    logoutBtn.addEventListener('click', () => { auth.signOut().then(() => window.location.href = 'login.html'); });

    // ==================== Profile ====================
    async function loadProfilePicture() {
        try {
            const userDoc = await db.collection('users').doc(currentUserId).get();
            const data = userDoc.data();
            if (data && data.profilePic) {
                currentProfilePic = data.profilePic;
                headerAvatarText.style.display = 'none';
                headerAvatarImg.style.display = 'block';
                headerAvatarImg.src = data.profilePic;
            } else {
                headerAvatarText.style.display = 'block';
                headerAvatarImg.style.display = 'none';
                headerAvatarText.innerText = currentUserEmail.charAt(0).toUpperCase();
            }
        } catch (err) { console.warn('Load profile pic error:', err); }
    }

    function openProfileModal() {
        profileName.innerText = currentUserEmail.split('@')[0] || 'User';
        profileEmail.innerText = currentUserEmail;
        db.collection('users').doc(currentUserId).get().then(doc => {
            const data = doc.data();
            profileRole.innerText = data?.role || 'User';
        });
        profileDriveStatus.innerText = isDriveSignedIn ? '✅ Connected' : '🔐 Not connected';
        if (currentProfilePic) {
            previewImg.style.display = 'block';
            previewText.style.display = 'none';
            previewImg.src = currentProfilePic;
        } else {
            previewImg.style.display = 'none';
            previewText.style.display = 'block';
            previewText.innerText = '👤';
        }
        profileFileInput.value = '';
        profileSaveBtn.disabled = true;
        profileMessage.innerText = '';
        profileModal.style.display = 'flex';
    }

    profileFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.style.display = 'block';
            previewText.style.display = 'none';
            previewImg.src = ev.target.result;
            profileSaveBtn.disabled = false;
            profileMessage.innerText = '';
        };
        reader.readAsDataURL(file);
        this._file = file;
    });

    document.getElementById('profileSaveBtn').addEventListener('click', async function() {
        const file = profileFileInput._file;
        if (!file) { profileMessage.innerText = 'Please select a photo first.'; return; }
        profileSaveBtn.disabled = true;
        profileMessage.innerText = 'Uploading...';
        try {
            const { viewUrl } = await uploadToDrive(file);
            await db.collection('users').doc(currentUserId).update({ profilePic: viewUrl });
            currentProfilePic = viewUrl;
            headerAvatarText.style.display = 'none';
            headerAvatarImg.style.display = 'block';
            headerAvatarImg.src = viewUrl;
            previewImg.src = viewUrl;
            profileMessage.innerText = '✅ Profile picture updated!';
            setTimeout(() => closeModal('profileModal'), 1500);
        } catch (err) {
            profileMessage.innerText = '❌ Error: ' + err.message;
            profileSaveBtn.disabled = false;
        }
    });

    // ==================== Load Internal Users ====================
    async function loadUsers() {
        try {
            const snap = await db.collection('users').get();
            allUsers = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (doc.id !== currentUserId) {
                    allUsers.push({ uid: doc.id, email: data.email, display: data.email.split('@')[0], profilePic: data.profilePic || null });
                }
            });
        } catch (err) { console.error('Load users error:', err); allUsers = []; }
    }

    function populateInternalUsers() {
        composeInternal.innerHTML = '<option value="">-- Internal users --</option>';
        allUsers.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.email;
            opt.textContent = u.display + ' (' + u.email + ')';
            composeInternal.appendChild(opt);
        });
    }

    // ==================== Folder switching ====================
    function switchFolder(folder) {
        currentFolder = folder;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`.nav-item[data-folder="${folder}"]`)?.classList.add('active');
        folderTitle.innerText = folder.charAt(0).toUpperCase() + folder.slice(1);
        loadFolder(folder);
    }

    async function loadFolder(folder) {
        if (unsubscribeFolder) { unsubscribeFolder(); unsubscribeFolder = null; }
        let query = db.collection('emails');
        if (folder === 'inbox') {
            query = query.where('to', 'array-contains', currentUserEmail).where('isDraft', '==', false);
        } else if (folder === 'sent') {
            query = query.where('fromEmail', '==', currentUserEmail).where('isDraft', '==', false);
        } else if (folder === 'drafts') {
            query = query.where('fromEmail', '==', currentUserEmail).where('isDraft', '==', true);
        } else {
            return;
        }
        query = query.orderBy('timestamp', 'desc');
        unsubscribeFolder = query.onSnapshot((snap) => {
            const emails = [];
            snap.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                emails.push(data);
            });
            renderEmailList(emails, folder);
            updateBadge(emails, folder);
        }, (error) => {
            console.error('Folder load error:', error);
            emailList.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Error loading emails.</div>';
        });
    }

    function renderEmailList(emails, folder) {
        if (emails.length === 0) {
            emailList.innerHTML = `<div style="text-align:center;padding:40px;color:#888;">No emails in ${folder}</div>`;
            return;
        }
        let html = '';
        emails.forEach(email => {
            const from = email.from || email.fromEmail || 'Unknown';
            const to = email.to || [];
            const subject = email.subject || '(no subject)';
            const body = email.body || '';
            const preview = body.substring(0, 60) + (body.length > 60 ? '...' : '');
            const date = email.timestamp ? new Date(email.timestamp.toDate()).toLocaleString() : '';
            const isUnread = !email.read && folder === 'inbox';
            const hasAttach = email.attachments && email.attachments.length > 0;
            const fromDisplay = from === currentUserEmail ? 'Me' : from.split('@')[0];
            const avatarHtml = getUserAvatar(from);
            html += `
                <div class="email-item ${isUnread ? 'unread' : ''}" onclick="viewEmail('${email.id}')">
                    <div class="avatar">${avatarHtml}</div>
                    <div class="details">
                        <div class="from">${fromDisplay}</div>
                        <div class="subject">${subject} ${hasAttach ? '📎' : ''}</div>
                        <div class="preview">${preview}</div>
                    </div>
                    <div class="date">${date}</div>
                </div>
            `;
        });
        emailList.innerHTML = html;
    }

    function getUserAvatar(email) {
        const user = allUsers.find(u => u.email === email);
        if (user && user.profilePic) {
            return `<img src="${user.profilePic}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerText='${email.charAt(0).toUpperCase()}'"/>`;
        }
        return email.charAt(0).toUpperCase();
    }

    function updateBadge(emails, folder) {
        if (folder === 'inbox') {
            const unread = emails.filter(e => !e.read).length;
            inboxBadge.innerText = unread;
        }
    }

    // ==================== View Email ====================
    window.viewEmail = async function(emailId) {
        const doc = await db.collection('emails').doc(emailId).get();
        if (!doc.exists) return;
        const email = doc.data();
        currentViewEmailId = emailId;
        if (!email.read && currentFolder === 'inbox') {
            await doc.ref.update({ read: true });
        }
        const from = email.from || email.fromEmail || 'Unknown';
        const to = (email.to || []).join(', ');
        const subject = email.subject || '(no subject)';
        const body = email.body || '';
        const date = email.timestamp ? new Date(email.timestamp.toDate()).toLocaleString() : '';
        let attachmentsHtml = '';
        if (email.attachments && email.attachments.length > 0) {
            attachmentsHtml = '<div class="attachments">' + email.attachments.map(a =>
                `<a href="${a.url}" target="_blank">📎 ${a.name}</a>`
            ).join('') + '</div>';
        }
        const html = `
            <div class="email-view">
                <div class="meta">
                    <div class="from"><strong>From:</strong> ${from}</div>
                    <div class="to"><strong>To:</strong> ${to}</div>
                    <div class="date">${date}</div>
                </div>
                <h3>${subject}</h3>
                <div class="body">${body}</div>
                ${attachmentsHtml}
            </div>
        `;
        viewContent.innerHTML = html;
        viewModal.style.display = 'flex';
    };

    window.deleteEmail = async function() {
        if (!currentViewEmailId) return;
        if (!confirm('Delete this email permanently?')) return;
        await db.collection('emails').doc(currentViewEmailId).delete();
        closeModal('viewEmailModal');
        loadFolder(currentFolder);
    };

    window.replyEmail = function() {
        const doc = db.collection('emails').doc(currentViewEmailId);
        doc.get().then(snap => {
            const email = snap.data();
            if (email) {
                composeTo.value = email.from || email.fromEmail || '';
                composeSubject.value = 'Re: ' + (email.subject || '');
                closeModal('viewEmailModal');
                openCompose();
            }
        });
    };

    // ==================== Compose ====================
    function openCompose() {
        composeTo.value = '';
        composeInternal.value = '';
        composeSubject.value = '';
        composeBody.value = '';
        composeExternal.checked = false;
        composeMessage.innerText = '';
        permissionInfo.style.display = 'none';
        clearFilePreview();
        composeModal.style.display = 'flex';
    }

    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', function(e) {
        if (this.files.length > 0) {
            showFilePreview(this.files[0]);
        }
    });

    function showFilePreview(file) {
        if (!file) { filePreviewArea.classList.remove('show'); attachStatus.innerText = 'No file attached'; return; }
        filePreviewName.textContent = file.name;
        const size = file.size < 1024 ? file.size + ' B' :
                     file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB' :
                     (file.size / 1048576).toFixed(1) + ' MB';
        filePreviewSize.textContent = size;
        if (file.type && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => { filePreviewThumb.src = e.target.result; filePreviewThumb.style.display = 'block'; };
            reader.readAsDataURL(file);
        } else {
            filePreviewThumb.style.display = 'none';
        }
        filePreviewArea.classList.add('show');
        attachStatus.innerText = `📎 ${file.name}`;
        pendingFile = file;
    }

    removeFileBtn.addEventListener('click', clearFilePreview);

    function clearFilePreview() {
        filePreviewArea.classList.remove('show');
        filePreviewThumb.src = '';
        filePreviewName.textContent = '';
        filePreviewSize.textContent = '';
        attachStatus.innerText = 'No file attached';
        fileInput.value = '';
        pendingFile = null;
    }

    composeInternal.addEventListener('change', function() {
        if (this.value) {
            const existing = composeTo.value.split(',').map(s => s.trim()).filter(s => s);
            if (!existing.includes(this.value)) {
                existing.push(this.value);
                composeTo.value = existing.join(', ');
            }
            this.value = '';
        }
    });

    // ==================== Save Draft (with local fallback) ====================
    window.saveDraft = async function() {
        const toRaw = composeTo.value.trim();
        const subject = composeSubject.value.trim();
        const body = composeBody.value.trim();
        if (!toRaw && !subject && !body) { composeMessage.innerText = 'Nothing to save.'; return; }
        const toList = toRaw.split(',').map(s => s.trim()).filter(s => s);
        let attachmentUrl = null, attachmentName = null;
        if (pendingFile) {
            try {
                const { viewUrl } = await uploadToDrive(pendingFile);
                attachmentUrl = viewUrl;
                attachmentName = pendingFile.name;
            } catch (err) {
                composeMessage.innerText = 'Attachment upload failed: ' + err.message;
                return;
            }
        }
        const draftData = {
            from: currentUserEmail,
            fromEmail: currentUserEmail,
            to: toList,
            subject: subject,
            body: body,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            read: false,
            isDraft: true,
            attachments: attachmentUrl ? [{ name: attachmentName, url: attachmentUrl }] : [],
            isExternal: false
        };

        try {
            await db.collection('emails').add(draftData);
            composeMessage.innerText = '💾 Draft saved successfully!';
            clearFilePreview();
            composeTo.value = '';
            composeSubject.value = '';
            composeBody.value = '';
            setTimeout(() => closeModal('composeModal'), 1200);
            loadFolder(currentFolder);
        } catch (err) {
            console.error('Draft save error:', err);
            if (err.code === 'permission-denied' || err.message.includes('permission')) {
                // Save locally as fallback
                const localDrafts = JSON.parse(localStorage.getItem('localDrafts') || '[]');
                draftData.localTimestamp = Date.now();
                localDrafts.push(draftData);
                localStorage.setItem('localDrafts', JSON.stringify(localDrafts));
                composeMessage.innerText = '⚠️ Draft saved locally (permission denied). Please update Firestore rules.';
                showPermissionHelp();
            } else {
                composeMessage.innerText = '❌ Error saving draft: ' + err.message;
            }
        }
    };

    // ==================== Send Email (with permission handling) ====================
    composeForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const toRaw = composeTo.value.trim();
        const subject = composeSubject.value.trim();
        const body = composeBody.value.trim();
        const isExternal = composeExternal.checked;
        if (!toRaw) { composeMessage.innerText = 'Please enter at least one recipient.'; return; }
        if (!subject && !body) { composeMessage.innerText = 'Please enter a subject or message.'; return; }
        const toList = toRaw.split(',').map(s => s.trim()).filter(s => s);

        let attachmentUrl = null;
        let attachmentName = null;
        if (pendingFile) {
            try {
                const { viewUrl } = await uploadToDrive(pendingFile);
                attachmentUrl = viewUrl;
                attachmentName = pendingFile.name;
            } catch (err) {
                composeMessage.innerText = 'Attachment upload failed: ' + err.message;
                return;
            }
        }

        const emailData = {
            from: currentUserEmail,
            fromEmail: currentUserEmail,
            to: toList,
            subject: subject,
            body: body,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            read: false,
            isDraft: false,
            attachments: attachmentUrl ? [{ name: attachmentName, url: attachmentUrl }] : [],
            isExternal: isExternal
        };

        try {
            await db.collection('emails').add(emailData);
            if (isExternal) {
                const templateParams = {
                    to_email: toList.join(', '),
                    subject: subject,
                    message: body,
                    attachment_url: attachmentUrl || '',
                    from_name: currentUserEmail,
                };
                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    composeMessage.innerText = '✅ Email sent internally and externally!';
                } catch (emailjsErr) {
                    console.error('EmailJS error:', emailjsErr);
                    composeMessage.innerText = '⚠️ Sent internally but external email failed: ' + emailjsErr.message;
                }
            } else {
                composeMessage.innerText = '✅ Email sent successfully!';
            }
            clearFilePreview();
            composeTo.value = '';
            composeSubject.value = '';
            composeBody.value = '';
            composeExternal.checked = false;
            setTimeout(() => closeModal('composeModal'), 1500);
            loadFolder(currentFolder);
        } catch (err) {
            console.error('Send error:', err);
            if (err.code === 'permission-denied' || err.message.includes('permission')) {
                composeMessage.innerText = '❌ Cannot send – permission denied. Please update Firestore rules.';
                showPermissionHelp();
            } else {
                composeMessage.innerText = '❌ Error: ' + err.message;
            }
        }
    });

    function showPermissionHelp() {
        permissionInfo.innerHTML = `
            <p><strong>⚠️ Firestore permission error.</strong> To fix:</p>
            <ol>
                <li>Go to <a href="https://console.firebase.google.com/project/${firebaseConfig.projectId}/firestore/rules" target="_blank">Firestore Rules</a></li>
                <li>Add this rule for <code>emails</code>:</li>
                <pre style="background:#f0f0f0;padding:8px;border-radius:8px;font-size:0.8rem;">
match /emails/{document} {
  allow read, write: if request.auth != null;
}
                </pre>
                <li>Click <strong>Publish</strong> and try again.</li>
            </ol>
            <p><em>Your draft has been saved locally. It will sync when permissions are fixed.</em></p>
        `;
        permissionInfo.style.display = 'block';
    }

    // ==================== Refresh ====================
    window.refreshFolder = function() {
        loadFolder(currentFolder);
    };

    // ==================== Modal helpers ====================
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        profileSaveBtn.disabled = true;
        profileMessage.innerText = '';
        permissionInfo.style.display = 'none';
    }
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
            profileSaveBtn.disabled = true;
            profileMessage.innerText = '';
            permissionInfo.style.display = 'none';
        }
    };

    // ==================== Init ====================
    if (typeof google !== 'undefined' && google.accounts) {
        initDriveClient();
    } else {
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof google !== 'undefined' && google.accounts) {
                initDriveClient();
            } else {
                setTimeout(initDriveClient, 2000);
            }
        });
    }

    console.log('NEVAMAK Email Client loaded with permission handling.');
</script>
</body>
</html>
