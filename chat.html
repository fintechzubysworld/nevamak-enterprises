<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Chat & Collaboration</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <!-- Google Identity Services (OAuth 2.0) -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 12px; display: flex; flex-direction: column; height: 100vh; max-height: 100vh; }
        .container { max-width: 1100px; margin: auto; width: 100%; display: flex; flex-direction: column; flex: 1; }
        header { background: #0a3d62; color: white; padding: 10px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #3c6382; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; border: none; cursor: pointer; }
        .chat-layout { display: flex; flex: 1; gap: 12px; min-height: 0; }
        .sidebar { background: white; border-radius: 20px; padding: 12px; width: 220px; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sidebar h3 { margin: 0 0 8px; font-size: 0.9rem; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 8px 12px; border-radius: 40px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .user-item:hover { background: #eef2f5; }
        .user-item.active { background: #d4e2f0; font-weight: 600; }
        .user-item .online { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .online-true { background: #27ae60; }
        .online-false { background: #bbb; }
        .user-item .unread { background: #e74c3c; color: white; border-radius: 50%; padding: 0 6px; font-size: 0.7rem; margin-left: auto; }
        .user-item .avatar-sm { width: 24px; height: 24px; border-radius: 50%; background: #ccc; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #555; overflow: hidden; flex-shrink: 0; }
        .user-item .avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
        .chat-main { background: white; border-radius: 20px; display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .chat-header { padding: 10px 16px; border-bottom: 1px solid #ddd; font-weight: bold; background: #f8f9fa; border-radius: 20px 20px 0 0; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
        .chat-header .avatar { width: 36px; height: 36px; border-radius: 50%; background: #3c6382; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; overflow: hidden; flex-shrink: 0; }
        .chat-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header .avatar:hover { opacity: 0.8; }
        .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 18px; word-wrap: break-word; position: relative; }
        .message.sent { align-self: flex-end; background: #0a3d62; color: white; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background: #e9ecef; color: #222; border-bottom-left-radius: 4px; }
        .message .sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 2px; }
        .message .time { font-size: 0.6rem; opacity: 0.5; margin-top: 4px; text-align: right; }
        .message .file-attach { display: block; margin-top: 4px; }
        .message .file-attach img { max-width: 180px; max-height: 150px; border-radius: 8px; cursor: pointer; }
        .message .file-attach a { color: #0a3d62; word-break: break-all; }
        .reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 20px; background: #f0f0f0; }
        .reaction-btn:hover { background: #ddd; }
        .message-input-area { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #ddd; background: #f8f9fa; flex-wrap: wrap; align-items: flex-end; border-radius: 0 0 20px 20px; flex-shrink: 0; }
        .message-input-area textarea { flex: 1; padding: 8px 14px; border-radius: 40px; border: 1px solid #ccc; font-size: 0.95rem; resize: none; min-height: 44px; max-height: 120px; font-family: inherit; }
        .message-input-area button { background: #0a3d62; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: bold; height: 44px; }
        .message-input-area .file-btn { background: #27ae60; }
        .message-input-area .emoji-btn { background: #f39c12; }
        .emoji-picker { display: none; background: white; border: 1px solid #ddd; border-radius: 20px; padding: 8px; position: absolute; bottom: 70px; right: 20px; z-index: 100; max-width: 300px; max-height: 200px; overflow-y: auto; }
        .emoji-picker.show { display: block; }
        .emoji-picker span { font-size: 1.6rem; cursor: pointer; padding: 4px; display: inline-block; transition: 0.1s; }
        .emoji-picker span:hover { background: #ddd; border-radius: 8px; }
        .typing-indicator { font-size: 0.8rem; color: #888; padding: 4px 12px; height: 24px; }
        .search-box { padding: 6px 12px; border-radius: 40px; border: 1px solid #ccc; width: 100%; margin-bottom: 8px; }
        @media (max-width: 768px) { .sidebar { width: 100%; max-height: 150px; flex-shrink: 0; } .chat-layout { flex-direction: column; } .user-list { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 4px; } .user-item { flex-shrink: 0; } }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; max-width: 500px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 1.8rem; }
        .file-preview { max-width: 100%; max-height: 80vh; }
        .drive-status { font-size: 0.7rem; display: flex; align-items: center; gap: 6px; }
        .drive-status button { background: none; border: none; color: #0a3d62; cursor: pointer; text-decoration: underline; font-size: 0.7rem; }
        .error-msg { color: #e74c3c; padding: 4px 12px; text-align: center; font-size: 0.8rem; }
        .profile-modal .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #ccc; margin: 12px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .profile-modal .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .profile-modal .avatar-preview span { font-size: 3rem; color: #888; }
        .profile-modal input[type="file"] { display: none; }
        .profile-modal .btn-upload { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .profile-modal .btn-save { background: #0a3d62; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .profile-modal .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>💬 NEVAMAK Collaboration</h1>
        <div class="nav-links">
            <a href="index.html">🏠 Dashboard</a>
            <a href="lagos_dispatch.html">📦 Dispatch</a>
            <a href="reports.html">📊 Reports</a>
            <a href="picture_repo.html">🖼️ Pictures</a>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </header>

    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>👥 Contacts</h3>
            <input class="search-box" id="userSearch" placeholder="Search users...">
            <div class="user-list" id="userList">
                <div class="user-item active" data-userid="global" onclick="switchChat('global')">
                    <span>🌐 Global Chat</span>
                </div>
            </div>
        </div>

        <!-- Chat main -->
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <div class="avatar" id="profileAvatar" onclick="openProfileModal()" title="Click to edit profile">
                    <span id="avatarText">👤</span>
                    <img id="avatarImg" style="display:none;" />
                </div>
                <span id="chatHeaderTitle">Global Chat</span>
                <div class="drive-status" style="margin-left:auto;">
                    <span id="driveStatusText">🔐 Drive</span>
                    <button id="driveSignInBtn" onclick="signInToDrive()">Sign in</button>
                </div>
            </div>
            <div class="messages" id="messagesContainer"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="message-input-area" style="position:relative;">
                <button class="emoji-btn" id="emojiToggle">😊</button>
                <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
                <button class="file-btn" id="fileUploadBtn">📎</button>
                <button id="sendBtn">Send</button>
                <input type="file" id="fileInput" style="display:none;" multiple>
                <div class="emoji-picker" id="emojiPicker"></div>
            </div>
        </div>
    </div>
</div>

<!-- Profile Edit Modal -->
<div id="profileModal" class="modal profile-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('profileModal')">&times;</span>
        <h2 style="text-align:center;">Edit Profile</h2>
        <div style="text-align:center;">
            <div class="avatar-preview" id="profilePreview">
                <span id="previewText">👤</span>
                <img id="previewImg" style="display:none;" />
            </div>
            <div>
                <input type="file" id="profileFileInput" accept="image/*">
                <button class="btn-upload" onclick="document.getElementById('profileFileInput').click()">📷 Choose Photo</button>
            </div>
            <div style="margin-top:12px; text-align:left;">
                <p><strong>Name:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Role:</strong> <span id="profileRole"></span></p>
                <p><strong>Drive Status:</strong> <span id="profileDriveStatus"></span></p>
            </div>
            <button class="btn-save" id="profileSaveBtn" disabled>💾 Save Changes</button>
            <div id="profileMessage" style="color:red; margin-top:8px;"></div>
        </div>
    </div>
</div>

<!-- File preview modal -->
<div id="fileModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('fileModal')">&times;</span>
        <img id="fileModalImage" class="file-preview" style="display:none;" />
        <iframe id="fileModalIframe" style="width:100%; height:80vh; display:none;" frameborder="0"></iframe>
        <a id="fileModalLink" href="#" target="_blank" style="display:none;">Download</a>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==================== Google Drive Config ====================
    const DRIVE_FOLDER_ID = '1TjtzQiwAVLQ7ZPyDlBBNOq-xsbATAFwS';
    const CLIENT_ID = '442510200976-2iifvf15c8rha9jcie1mu46hbpv4l7ob.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient = null;
    let accessToken = null;
    let isDriveSignedIn = false;
    let driveInitialized = false;
    let pendingFileUpload = null; // file to upload after drive sign-in

    // ==================== State ====================
    let currentUser = null;
    let currentUserId = "";
    let currentUserEmail = "";
    let currentChatId = "global";
    let currentChatDisplay = "Global Chat";
    let allUsers = [];
    let unsubscribeMessages = null;
    let unsubscribeTyping = null;
    let typingTimeout = null;
    let currentProfilePic = null;

    // ==================== DOM ====================
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const fileUploadBtn = document.getElementById('fileUploadBtn');
    const emojiToggle = document.getElementById('emojiToggle');
    const emojiPicker = document.getElementById('emojiPicker');
    const typingIndicator = document.getElementById('typingIndicator');
    const userList = document.getElementById('userList');
    const chatHeaderTitle = document.getElementById('chatHeaderTitle');
    const userSearch = document.getElementById('userSearch');
    const logoutBtn = document.getElementById('logoutBtn');
    const profileAvatar = document.getElementById('profileAvatar');
    const avatarText = document.getElementById('avatarText');
    const avatarImg = document.getElementById('avatarImg');
    const driveStatusText = document.getElementById('driveStatusText');
    const driveSignInBtn = document.getElementById('driveSignInBtn');
    const profileModal = document.getElementById('profileModal');
    const previewImg = document.getElementById('previewImg');
    const previewText = document.getElementById('previewText');
    const profileFileInput = document.getElementById('profileFileInput');
    const profileSaveBtn = document.getElementById('profileSaveBtn');
    const profileMessage = document.getElementById('profileMessage');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const profileRole = document.getElementById('profileRole');
    const profileDriveStatus = document.getElementById('profileDriveStatus');

    // ==================== Google Drive OAuth ====================
    function initDriveClient() {
        if (typeof google === 'undefined' || !google.accounts) {
            console.warn('Google Identity Services not loaded – retrying in 1s');
            setTimeout(initDriveClient, 1000);
            return;
        }
        if (driveInitialized) return;
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                if (tokenResponse.error) {
                    console.error('Drive token error:', tokenResponse);
                    driveStatusText.innerText = '🔴 Drive Error';
                    driveSignInBtn.style.display = 'inline';
                    return;
                }
                accessToken = tokenResponse.access_token;
                isDriveSignedIn = true;
                localStorage.setItem('drive_access_token', accessToken);
                localStorage.setItem('drive_token_expiry', Date.now() + 3600 * 1000);
                driveStatusText.innerText = '✅ Drive';
                driveSignInBtn.style.display = 'none';
                driveInitialized = true;
                // If there was a pending file upload, process it now
                if (pendingFileUpload) {
                    const file = pendingFileUpload;
                    pendingFileUpload = null;
                    uploadAndSendFile(file);
                }
                // Update profile modal drive status if open
                if (profileModal.style.display === 'flex') {
                    profileDriveStatus.innerText = '✅ Connected';
                }
            },
        });
        driveInitialized = true;
    }

    function signInToDrive() {
        if (!tokenClient) {
            initDriveClient();
            if (!tokenClient) {
                alert('Google Drive not available. Please refresh.');
                return;
            }
        }
        tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    function getDriveToken() {
        const stored = localStorage.getItem('drive_access_token');
        const expiry = parseInt(localStorage.getItem('drive_token_expiry') || '0');
        if (stored && expiry > Date.now()) {
            accessToken = stored;
            isDriveSignedIn = true;
            driveStatusText.innerText = '✅ Drive';
            driveSignInBtn.style.display = 'none';
            return accessToken;
        }
        if (accessToken) return accessToken;
        // Try silent refresh if token client exists
        if (tokenClient && !isDriveSignedIn) {
            tokenClient.requestAccessToken({
                prompt: 'none',
                callback: (resp) => {
                    if (resp.error) {
                        console.log('Silent token refresh failed:', resp.error);
                        driveStatusText.innerText = '🔐 Drive';
                        driveSignInBtn.style.display = 'inline';
                        return;
                    }
                    accessToken = resp.access_token;
                    isDriveSignedIn = true;
                    localStorage.setItem('drive_access_token', accessToken);
                    localStorage.setItem('drive_token_expiry', Date.now() + 3600 * 1000);
                    driveStatusText.innerText = '✅ Drive';
                    driveSignInBtn.style.display = 'none';
                }
            });
        }
        return null;
    }

    // ==================== Upload to Drive ====================
    async function uploadToDrive(file) {
        let token = getDriveToken();
        if (!token) {
            // Try to get token silently
            token = getDriveToken();
            if (!token) {
                driveStatusText.innerText = '🔐 Drive';
                driveSignInBtn.style.display = 'inline';
                throw new Error('Not signed in to Google Drive. Please click "Sign in" in the chat header.');
            }
        }

        try {
            const base64 = await readFileAsBase64(file);
            const metadata = {
                name: file.name,
                parents: [DRIVE_FOLDER_ID],
            };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([base64], { type: 'application/octet-stream' }));

            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: form,
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            // Get the shareable link
            const fileInfo = await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}?fields=webContentLink`, {
                headers: { 'Authorization': `Bearer ${token}` },
            });
            const fileData = await fileInfo.json();
            return fileData.webContentLink || `https://drive.google.com/thumbnail?id=${data.id}`;
        } catch (err) {
            if (err.message.includes('401') || err.message.includes('403')) {
                localStorage.removeItem('drive_access_token');
                localStorage.removeItem('drive_token_expiry');
                accessToken = null;
                isDriveSignedIn = false;
                driveStatusText.innerText = '🔐 Drive';
                driveSignInBtn.style.display = 'inline';
                throw new Error('Google Drive session expired. Please sign in again.');
            }
            throw err;
        }
    }

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ==================== Upload and send file ====================
    async function uploadAndSendFile(file) {
        try {
            const fileUrl = await uploadToDrive(file);
            const fileName = file.name;
            const fileType = file.type;
            // Now send message with file link
            const text = messageInput.value.trim();
            const chatId = currentChatId === 'global' ? 'global' : [currentUserId, currentChatId].sort().join('_');
            const senderName = currentUserEmail.split('@')[0];
            const msgData = {
                chatId: chatId,
                senderId: currentUserId,
                senderName: senderName,
                text: text || '',
                fileUrl: fileUrl,
                fileName: fileName,
                fileType: fileType,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                reactions: {},
                readBy: [currentUserId]
            };
            await db.collection('messages').add(msgData);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            clearTyping();
        } catch (err) {
            alert('File upload failed: ' + err.message);
        }
    }

    // ==================== Auth ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        currentUserId = user.uid;
        currentUserEmail = user.email;

        // Init Drive client
        initDriveClient();
        getDriveToken();

        // Load profile picture
        await loadProfilePicture();

        await loadUsers();
        await updatePresence(true);
        switchChat('global');
        setInterval(() => updatePresence(true), 30000);
        window.addEventListener('beforeunload', () => updatePresence(false));
    });

    logoutBtn.addEventListener('click', () => {
        updatePresence(false);
        auth.signOut().then(() => window.location.href = 'login.html');
    });

    // ==================== Profile Picture ====================
    async function loadProfilePicture() {
        try {
            const userDoc = await db.collection('users').doc(currentUserId).get();
            const data = userDoc.data();
            if (data && data.profilePic) {
                currentProfilePic = data.profilePic;
                avatarText.style.display = 'none';
                avatarImg.style.display = 'block';
                avatarImg.src = data.profilePic;
            } else {
                avatarText.style.display = 'block';
                avatarImg.style.display = 'none';
                avatarText.innerText = currentUserEmail.charAt(0).toUpperCase();
            }
        } catch (err) {
            console.warn('Load profile pic error:', err);
        }
    }

    // ==================== Profile Modal ====================
    function openProfileModal() {
        // Populate info
        profileName.innerText = currentUserEmail.split('@')[0] || 'User';
        profileEmail.innerText = currentUserEmail;
        // Get role
        db.collection('users').doc(currentUserId).get().then(doc => {
            const data = doc.data();
            profileRole.innerText = data?.role || 'User';
        });
        // Drive status
        profileDriveStatus.innerText = isDriveSignedIn ? '✅ Connected' : '🔐 Not connected';
        // Preview current picture
        if (currentProfilePic) {
            previewImg.style.display = 'block';
            previewText.style.display = 'none';
            previewImg.src = currentProfilePic;
        } else {
            previewImg.style.display = 'none';
            previewText.style.display = 'block';
            previewText.innerText = '👤';
        }
        profileFileInput.value = '';
        profileSaveBtn.disabled = true;
        profileMessage.innerText = '';
        profileModal.style.display = 'flex';
    }

    // Profile file input change
    profileFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        // Preview
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.style.display = 'block';
            previewText.style.display = 'none';
            previewImg.src = ev.target.result;
            profileSaveBtn.disabled = false;
            profileMessage.innerText = '';
        };
        reader.readAsDataURL(file);
        // Store the file for later upload
        profileFileInput._file = file;
    });

    // Save profile picture
    document.getElementById('profileSaveBtn').addEventListener('click', async function() {
        const file = profileFileInput._file;
        if (!file) {
            profileMessage.innerText = 'Please select a photo first.';
            return;
        }
        profileSaveBtn.disabled = true;
        profileMessage.innerText = 'Uploading...';
        try {
            const url = await uploadToDrive(file);
            // Update Firestore
            await db.collection('users').doc(currentUserId).update({
                profilePic: url,
            });
            currentProfilePic = url;
            // Update UI
            avatarText.style.display = 'none';
            avatarImg.style.display = 'block';
            avatarImg.src = url;
            // Update preview
            previewImg.src = url;
            profileMessage.innerText = '✅ Profile picture updated!';
            // Refresh user list
            loadUsers();
            setTimeout(() => closeModal('profileModal'), 1500);
        } catch (err) {
            profileMessage.innerText = '❌ Error: ' + err.message;
            profileSaveBtn.disabled = false;
        }
    });

    // ==================== Load Users ====================
    async function loadUsers() {
        try {
            const snap = await db.collection('users').get();
            allUsers = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (doc.id !== currentUserId) {
                    allUsers.push({
                        uid: doc.id,
                        email: data.email,
                        role: data.role || 'user',
                        online: data.online || false,
                        profilePic: data.profilePic || null,
                    });
                }
            });
            renderUserList(allUsers);
        } catch (err) {
            console.error('Load users error:', err);
            allUsers = [];
        }
    }

    function renderUserList(users) {
        let html = `<div class="user-item ${currentChatId === 'global' ? 'active' : ''}" data-userid="global" onclick="switchChat('global')">
                        <span>🌐 Global Chat</span>
                    </div>`;
        users.forEach(u => {
            const isActive = currentChatId === u.uid;
            const onlineClass = u.online ? 'true' : 'false';
            const unread = getUnreadCount(u.uid);
            const avatarHtml = u.profilePic ?
                `<img src="${u.profilePic}" style="width:100%;height:100%;object-fit:cover;" />` :
                `<span>${u.email.charAt(0).toUpperCase()}</span>`;
            html += `<div class="user-item ${isActive ? 'active' : ''}" data-userid="${u.uid}" onclick="switchChat('${u.uid}')">
                        <span class="online online-${onlineClass}"></span>
                        <div class="avatar-sm">${avatarHtml}</div>
                        <span>${u.email.split('@')[0]}</span>
                        ${unread > 0 ? `<span class="unread">${unread}</span>` : ''}
                    </div>`;
        });
        userList.innerHTML = html;
        const q = userSearch.value.toLowerCase();
        document.querySelectorAll('.user-item[data-userid]').forEach(el => {
            const uid = el.dataset.userid;
            if (uid === 'global') return;
            const user = allUsers.find(u => u.uid === uid);
            if (user && user.email.toLowerCase().includes(q)) {
                el.style.display = 'flex';
            } else {
                el.style.display = 'none';
            }
        });
    }

    // ==================== Unread Counts ====================
    let unreadCounts = {};
    function getUnreadCount(uid) {
        return unreadCounts[uid] || 0;
    }

    // ==================== Switch Chat ====================
    function switchChat(chatId) {
        if (unsubscribeMessages) {
            unsubscribeMessages();
            unsubscribeMessages = null;
        }
        if (unsubscribeTyping) {
            unsubscribeTyping();
            unsubscribeTyping = null;
        }
        currentChatId = chatId;

        if (chatId === 'global') {
            currentChatDisplay = '🌐 Global Chat';
        } else {
            const user = allUsers.find(u => u.uid === chatId);
            currentChatDisplay = `💬 ${user ? user.email.split('@')[0] : 'User'}`;
            markChatRead(chatId);
        }
        chatHeaderTitle.innerText = currentChatDisplay;
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        const target = document.querySelector(`.user-item[data-userid="${chatId}"]`);
        if (target) target.classList.add('active');

        messagesContainer.innerHTML = '';

        let firestoreChatId = chatId;
        if (chatId !== 'global') {
            const otherUid = chatId;
            const myUid = currentUserId;
            firestoreChatId = [myUid, otherUid].sort().join('_');
        }

        const q = db.collection('messages')
            .where('chatId', '==', firestoreChatId)
            .orderBy('timestamp', 'asc');

        unsubscribeMessages = q.onSnapshot(snapshot => {
            messagesContainer.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const isMine = data.senderId === currentUserId;
                const msgDiv = createMessageElement(data, isMine);
                messagesContainer.appendChild(msgDiv);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            typingIndicator.innerText = '';
        }, error => {
            console.error('Messages listener error:', error);
            messagesContainer.innerHTML = `<div class="error-msg">❌ Error loading messages: ${error.message}</div>`;
        });

        if (chatId !== 'global') {
            const typingRef = db.collection('typing').doc(firestoreChatId);
            unsubscribeTyping = typingRef.onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const typingUser = data.typingUser;
                    if (typingUser && typingUser !== currentUserId) {
                        const user = allUsers.find(u => u.uid === typingUser);
                        typingIndicator.innerText = `${user ? user.email.split('@')[0] : 'Someone'} is typing...`;
                    } else {
                        typingIndicator.innerText = '';
                    }
                }
            }, error => {
                console.error('Typing listener error:', error);
            });
        }
    }

    // ==================== Create Message Element ====================
    function createMessageElement(data, isMine) {
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'sent' : 'received'}`;
        if (!isMine && data.senderName) {
            const senderSpan = document.createElement('div');
            senderSpan.className = 'sender';
            senderSpan.innerText = data.senderName;
            div.appendChild(senderSpan);
        }
        if (data.text) {
            const textSpan = document.createElement('span');
            textSpan.innerText = data.text;
            div.appendChild(textSpan);
        }
        if (data.fileUrl) {
            const fileDiv = document.createElement('div');
            fileDiv.className = 'file-attach';
            const ext = data.fileName ? data.fileName.split('.').pop().toLowerCase() : '';
            if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) {
                const img = document.createElement('img');
                img.src = data.fileUrl;
                img.alt = data.fileName || 'Image';
                img.style.cursor = 'pointer';
                img.onclick = () => viewFile(data.fileUrl, 'image');
                fileDiv.appendChild(img);
            } else {
                const a = document.createElement('a');
                a.href = data.fileUrl;
                a.target = '_blank';
                a.innerText = `📎 ${data.fileName || 'Download'}`;
                fileDiv.appendChild(a);
            }
            div.appendChild(fileDiv);
        }
        if (data.reactions) {
            const reactDiv = document.createElement('div');
            reactDiv.className = 'reactions';
            const reactionKeys = Object.keys(data.reactions);
            reactionKeys.forEach(emoji => {
                const count = data.reactions[emoji].length;
                const btn = document.createElement('button');
                btn.className = 'reaction-btn';
                btn.innerText = `${emoji} ${count}`;
                btn.onclick = () => toggleReaction(data.messageId || data.id, emoji);
                reactDiv.appendChild(btn);
            });
            ['👍', '❤️', '😄', '🙏', '👏'].forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'reaction-btn';
                btn.innerText = emoji;
                btn.onclick = () => toggleReaction(data.messageId || data.id, emoji);
                reactDiv.appendChild(btn);
            });
            div.appendChild(reactDiv);
        }
        const timeSpan = document.createElement('div');
        timeSpan.className = 'time';
        timeSpan.innerText = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : '';
        div.appendChild(timeSpan);
        div.dataset.msgId = data.messageId || data.id;
        return div;
    }

    // ==================== Send Message (with file handling) ====================
    async function sendMessage() {
        const text = messageInput.value.trim();
        const hasFile = fileInput.files.length > 0;
        if (!text && !hasFile) return;

        // If there's a file, handle it separately
        if (hasFile) {
            const file = fileInput.files[0];
            fileInput.value = ''; // clear
            // Check drive sign-in
            if (!isDriveSignedIn && !getDriveToken()) {
                // Store file and prompt sign-in
                pendingFileUpload = file;
                driveStatusText.innerText = '🔐 Drive';
                driveSignInBtn.style.display = 'inline';
                // Show the sign-in prompt in the drive status
                alert('Please sign in to Google Drive first. Click "Sign in" in the chat header.');
                return;
            }
            try {
                await uploadAndSendFile(file);
            } catch (err) {
                alert('File upload failed: ' + err.message);
            }
            return;
        }

        // Text-only message
        const chatId = currentChatId === 'global' ? 'global' : [currentUserId, currentChatId].sort().join('_');
        const senderName = currentUserEmail.split('@')[0];
        const msgData = {
            chatId: chatId,
            senderId: currentUserId,
            senderName: senderName,
            text: text || '',
            fileUrl: null,
            fileName: null,
            fileType: null,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            reactions: {},
            readBy: [currentUserId]
        };

        try {
            await db.collection('messages').add(msgData);
        } catch (err) {
            console.error('Send error:', err);
            alert('Failed to send message: ' + err.message);
        }

        messageInput.value = '';
        messageInput.style.height = 'auto';
        clearTyping();
    }

    // ==================== File Upload Trigger ====================
    fileUploadBtn.addEventListener('click', () => fileInput.click());

    // ==================== Emoji Picker ====================
    const emojis = ['😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','😘','😗','😙','😚','☺️','🙂','🤗','🤩','🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯','😪','😫','😴','😌','😛','😜','😝','🤤','😒','😓','😔','😕','🙃','🤑','😲','☹️','🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','🥵','🥶','😳','🤪','😵','😡','😠','🤬','👍','👎','👊','✊','🤛','🤜','👏','🙌','👐','🤲','🤝','🙏','✌️','🤟','🤘','👌','❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💞','💓','💗','💖','💘','💝','✨','⭐','🌟','💫','🔥','💯','💢','💥','💦','💨','🕊️','🎉','🎊','🎁','🎈','🏆','🥇','🥈','🥉','🎖️','🏅','🎗️','🎀','🎯','🎲'];
    emojis.forEach(e => {
        const span = document.createElement('span');
        span.innerText = e;
        span.onclick = () => {
            messageInput.value += e;
            messageInput.focus();
            emojiPicker.classList.remove('show');
        };
        emojiPicker.appendChild(span);
    });

    emojiToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        emojiPicker.classList.toggle('show');
    });
    document.addEventListener('click', () => emojiPicker.classList.remove('show'));

    // ==================== Typing Indicator ====================
    messageInput.addEventListener('input', () => {
        if (currentChatId === 'global') return;
        const chatId = [currentUserId, currentChatId].sort().join('_');
        const typingRef = db.collection('typing').doc(chatId);
        typingRef.set({
            typingUser: currentUserId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(err => console.warn('Typing set error:', err));
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            typingRef.delete().catch(err => console.warn('Typing delete error:', err));
        }, 2000);
    });

    function clearTyping() {
        if (currentChatId === 'global') return;
        const chatId = [currentUserId, currentChatId].sort().join('_');
        db.collection('typing').doc(chatId).delete().catch(() => {});
    }

    // ==================== Reactions ====================
    async function toggleReaction(messageId, emoji) {
        const msgRef = db.collection('messages').doc(messageId);
        try {
            await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(msgRef);
                if (!doc.exists) return;
                const data = doc.data();
                let reactions = data.reactions || {};
                if (!reactions[emoji]) reactions[emoji] = [];
                const idx = reactions[emoji].indexOf(currentUserId);
                if (idx === -1) {
                    reactions[emoji].push(currentUserId);
                } else {
                    reactions[emoji].splice(idx, 1);
                    if (reactions[emoji].length === 0) delete reactions[emoji];
                }
                transaction.update(msgRef, { reactions });
            });
        } catch (err) {
            console.error('Reaction error:', err);
        }
    }

    // ==================== Mark Chat Read ====================
    async function markChatRead(chatId) {
        if (chatId === 'global') return;
        const composite = [currentUserId, chatId].sort().join('_');
        try {
            const snapshot = await db.collection('messages')
                .where('chatId', '==', composite)
                .where('senderId', '!=', currentUserId)
                .get();
            const batch = db.batch();
            snapshot.forEach(doc => {
                const data = doc.data();
                const readBy = data.readBy || [];
                if (!readBy.includes(currentUserId)) {
                    readBy.push(currentUserId);
                    batch.update(doc.ref, { readBy });
                }
            });
            await batch.commit();
            unreadCounts[chatId] = 0;
            renderUserList(allUsers);
        } catch (err) {
            console.warn('Mark chat read error:', err);
        }
    }

    // ==================== View File Modal ====================
    function viewFile(url, type) {
        const modal = document.getElementById('fileModal');
        const img = document.getElementById('fileModalImage');
        const iframe = document.getElementById('fileModalIframe');
        const link = document.getElementById('fileModalLink');
        img.style.display = 'none';
        iframe.style.display = 'none';
        link.style.display = 'none';
        if (type === 'image') {
            img.src = url;
            img.style.display = 'block';
        } else {
            iframe.src = url;
            iframe.style.display = 'block';
            link.href = url;
            link.style.display = 'block';
            link.innerText = 'Download file';
        }
        modal.style.display = 'flex';
    }
    window.viewFile = viewFile;

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        profileSaveBtn.disabled = true;
        profileMessage.innerText = '';
    }
    window.closeModal = closeModal;
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
            profileSaveBtn.disabled = true;
            profileMessage.innerText = '';
        }
    };

    // ==================== Presence ====================
    async function updatePresence(online) {
        if (!currentUserId) return;
        await db.collection('users').doc(currentUserId).update({
            online: online,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(() => {});
        const user = allUsers.find(u => u.uid === currentUserId);
        if (user) user.online = online;
        renderUserList(allUsers);
    }

    // ==================== Send on Enter ====================
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ==================== Search Users ====================
    userSearch.addEventListener('input', () => {
        const q = userSearch.value.toLowerCase();
        document.querySelectorAll('.user-item[data-userid]').forEach(el => {
            const uid = el.dataset.userid;
            if (uid === 'global') return;
            const user = allUsers.find(u => u.uid === uid);
            if (user && user.email.toLowerCase().includes(q)) {
                el.style.display = 'flex';
            } else {
                el.style.display = 'none';
            }
        });
    });

    // ==================== Send Button ====================
    sendBtn.addEventListener('click', sendMessage);

    // ==================== Auto-resize Textarea ====================
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    // ==================== Drive Sign-in Button ====================
    driveSignInBtn.addEventListener('click', signInToDrive);

    // ==================== Init ====================
    // Ensure Drive client is initialized when Google loads
    if (typeof google !== 'undefined' && google.accounts) {
        initDriveClient();
    } else {
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof google !== 'undefined' && google.accounts) {
                initDriveClient();
            } else {
                setTimeout(initDriveClient, 2000);
            }
        });
    }

    console.log('NEVAMAK Chat loaded with Profile Modal and File Attachment fixes.');
</script>
</body>
</html>
