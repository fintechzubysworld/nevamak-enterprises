<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEVAMAK – Lagos Dispatch</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        *{ box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body{ background: #f4f7fc; margin: 0; padding: 20px; }
        .container{ max-width: 1200px; margin: auto; }
        .card{ background: white; border-radius: 24px; padding: 24px; margin-bottom: 30px; box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        h2{ margin-top: 0; color: #0a3d62; }
        input, select, button{ padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; margin: 5px 0; }
        button{ background: #0a3d62; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover{ background: #1e3799; }
        .item-row{ display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .item-row input{ flex: 1; min-width: 120px; }
        .add-btn{ background: #27ae60; }
        .nav{ display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .nav a, .logout-btn{ text-decoration: none; background: #2c3e50; color: white; padding: 6px 15px; border-radius: 30px; border: none; cursor: pointer; }
        .cost-summary{ background: #e8f0fe; padding: 10px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">🏠 Dashboard</a>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
    <div class="card">
        <h2>📤 Create New Dispatch (Lagos Warehouse)</h2>
        <form id="dispatchForm">
            <label>Supply Representative Name (Lagos):</label><br>
            <input type="text" id="senderName" placeholder="e.g., Ade Lagos Rep" required><br><br>
            <label>Destination Branch:</label><br>
            <select id="destBranch">
                <option value="Abuja">NEXT Cash & Carry - Abuja</option>
                <option value="Portharcourt">NEXT Cash & Carry - Port Harcourt</option>
            </select><br><br>
            <label>Vehicle / Waybill #:</label><br>
            <input type="text" id="vehicleNo" placeholder="Optional"><br><br>
            <label>Transportation Cost (₦):</label><br>
            <input type="number" id="transportCost" placeholder="e.g., 150000" value="0" step="1000"><br><br>
            <label>Items (product, quantity, price per unit):</label>
            <div id="itemsContainer">
                <div class="item-row">
                    <input type="text" placeholder="Item name" class="itemName">
                    <input type="number" placeholder="Quantity" class="itemQty">
                    <input type="number" placeholder="Price per unit (₦)" class="itemPrice">
                    <button type="button" class="removeItem" style="background:#e74c3c;">✖</button>
                </div>
            </div>
            <button type="button" id="addItemBtn" class="add-btn">+ Add another product</button>
            <div class="cost-summary" id="costPreview">Total goods value: ₦0</div>
            <br>
            <button type="submit">🚛 Dispatch Shipment</button>
        </form>
    </div>
    <div class="card">
        <h2>📦 Recent Shipments from Lagos</h2>
        <div style="overflow-x: auto;">
            <table id="recentShipments">
                <thead><tr><th>ID</th><th>Dest.</th><th>Items</th><th>Goods Value</th><th>Transport</th><th>Status</th><th>Date</th>}</thead>
                <tbody><tr><td colspan="7">Loading...</td></tr>
            </tbody>
        寸�
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Auth & role check
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        const userDoc = await db.collection('users').doc(user.uid).get();
        const role = userDoc.data()?.role;
        if (role !== 'admin' && role !== 'lagos_sender') {
            await auth.signOut();
            window.location.href = 'login.html';
            return;
        }
        // Start Firestore listeners after auth
        loadRecentShipments();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'login.html'));

    // Dynamic items
    const itemsContainer = document.getElementById("itemsContainer");
    document.getElementById("addItemBtn").addEventListener("click", () => {
        const newRow = document.createElement("div");
        newRow.className = "item-row";
        newRow.innerHTML = `<input type="text" placeholder="Item name" class="itemName"><input type="number" placeholder="Quantity" class="itemQty"><input type="number" placeholder="Price per unit (₦)" class="itemPrice"><button type="button" class="removeItem" style="background:#e74c3c;">✖</button>`;
        itemsContainer.appendChild(newRow);
        attachRemoveEvent(newRow);
        updateCostPreview();
    });
    function attachRemoveEvent(row) { row.querySelector(".removeItem")?.addEventListener("click", () => { row.remove(); updateCostPreview(); }); }
    function updateCostPreview() {
        let total = 0;
        document.querySelectorAll(".item-row").forEach(row => {
            const qty = parseInt(row.querySelector(".itemQty")?.value || 0);
            const price = parseFloat(row.querySelector(".itemPrice")?.value || 0);
            total += qty * price;
        });
        document.getElementById("costPreview").innerHTML = `Total goods value: ₦${total.toLocaleString()}`;
    }
    document.getElementById("itemsContainer").addEventListener("input", updateCostPreview);
    
    document.getElementById("dispatchForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const senderName = document.getElementById("senderName").value.trim();
        const destBranch = document.getElementById("destBranch").value;
        const vehicleNo = document.getElementById("vehicleNo").value.trim();
        const transportCost = parseFloat(document.getElementById("transportCost").value) || 0;
        const rows = document.querySelectorAll(".item-row");
        let items = [];
        for(let row of rows){
            const name = row.querySelector(".itemName").value.trim();
            const qty = parseInt(row.querySelector(".itemQty").value);
            const price = parseFloat(row.querySelector(".itemPrice").value);
            if(name && qty > 0 && price >= 0){
                items.push({ itemName: name, orderedQty: qty, unitPrice: price, totalItemCost: qty * price, receivedQty: 0, damageQty: 0 });
            }
        }
        if(items.length === 0) return alert("Add at least one product.");
        if(!senderName) return alert("Enter rep name.");
        await db.collection("shipments").add({ senderName, destinationBranch: destBranch, vehicleNo, transportCost, items, status: "Dispatched", createdAt: firebase.firestore.FieldValue.serverTimestamp(), lastUpdated: firebase.firestore.FieldValue.serverTimestamp() });
        alert("✅ Shipment dispatched to " + destBranch);
        document.getElementById("dispatchForm").reset();
        document.getElementById("itemsContainer").innerHTML = `<div class="item-row"><input type="text" placeholder="Item name" class="itemName"><input type="number" placeholder="Quantity" class="itemQty"><input type="number" placeholder="Price per unit (₦)" class="itemPrice"><button type="button" class="removeItem" style="background:#e74c3c;">✖</button></div>`;
        updateCostPreview();
    });

    function loadRecentShipments() {
        db.collection("shipments").orderBy("createdAt", "desc").limit(20).onSnapshot((snap) => {
            let html = "";
            snap.forEach(doc => {
                const data = doc.data();
                let goodsValue = 0;
                if(data.items) data.items.forEach(i => goodsValue += (i.totalItemCost || 0));
                const itemsShort = data.items?.slice(0,2).map(i=>`${i.itemName}(${i.orderedQty})`).join(", ") + (data.items?.length>2?"...":"");
                html += `<tr>
                            <td>${doc.id.slice(0,6)}</td>
                            <td>${data.destinationBranch}</td>
                            <td>${itemsShort}</td>
                            <td class="cost-cell">₦${goodsValue.toLocaleString()}</td>
                            <td class="cost-cell">₦${(data.transportCost||0).toLocaleString()}</td>
                            <td>${data.status}</td>
                            <td>${data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString() : "recent"}</td>
                          </tr>`;
            });
            document.getElementById("recentShipments").querySelector("tbody").innerHTML = html || "<tr><td colspan='7'>No shipments yet</td></tr>";
        });
    }
</script>
</body>
</html>
