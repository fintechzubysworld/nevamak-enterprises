<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #0a3d62, #3c6382); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 16px; }
        .card { background: white; max-width: 500px; width: 100%; padding: 24px 20px; border-radius: 32px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        h1 { color: #0a3d62; margin: 0 0 5px; font-size: 1.8rem; text-align: center; }
        .sub { color: #555; margin-bottom: 25px; font-size: 0.9rem; text-align: center; }
        input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 1px solid #ccc; border-radius: 48px; font-size: 1rem; -webkit-appearance: none; }
        button { width: 100%; padding: 14px; background: #0a3d62; color: white; border: none; border-radius: 48px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 12px; transition: 0.2s; }
        button:hover { background: #1e3799; }
        .error { color: #e74c3c; margin-top: 12px; text-align: center; font-size: 0.9rem; }
        .info { color: #27ae60; text-align: center; margin-top: 12px; font-size: 0.85rem; }
        .setup-btn { background: #e67e22; margin-top: 20px; }
        .setup-btn:hover { background: #d35400; }
    </style>
</head>
<body>
<div class="card">
    <h1>🚛 NEVAMAK</h1>
    <div class="sub">Supply Chain Portal</div>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Sign In</button>
    <div id="message" class="error"></div>
    <div id="setupAdminContainer" style="display:none;">
        <button id="setupAdminBtn" class="setup-btn">🔧 Create Default Admin</button>
        <div class="info">admin@nevamak.com / admin123</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function checkAdminExists() {
        try {
            const snapshot = await db.collection('users').where('role', '==', 'admin').limit(1).get();
            document.getElementById('setupAdminContainer').style.display = snapshot.empty ? 'block' : 'none';
        } catch (err) {
            document.getElementById('setupAdminContainer').style.display = 'block';
        }
    }
    checkAdminExists();

    document.getElementById('setupAdminBtn')?.addEventListener('click', async () => {
        const adminEmail = 'admin@nevamak.com';
        const adminPassword = 'admin123';
        try {
            let uid;
            try {
                const userCred = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                uid = userCred.user.uid;
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    const user = await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
                    uid = user.user.uid;
                    await auth.signOut();
                } else throw err;
            }
            await db.collection('users').doc(uid).set({ email: adminEmail, role: 'admin', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert('✅ Admin ready! Sign in with admin@nevamak.com / admin123');
            document.getElementById('setupAdminContainer').style.display = 'none';
        } catch (err) { alert('Error: ' + err.message); }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        messageDiv.innerText = '';
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const uid = userCred.user.uid;
            let userDoc = await db.collection('users').doc(uid).get();
            if (!userDoc.exists && email === 'admin@nevamak.com') {
                await db.collection('users').doc(uid).set({ email, role: 'admin', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                userDoc = await db.collection('users').doc(uid).get();
            }
            if (!userDoc.exists) throw new Error('User role not found. Ask admin to create account.');
            const role = userDoc.data().role;
            if (role === 'admin' || role === 'lagos_sender') window.location.href = 'index.html';
            else if (role === 'abuja_rep') window.location.href = 'receive_abuja.html';
            else if (role === 'ph_rep') window.location.href = 'receive_ph.html';
            else throw new Error('Invalid role');
        } catch (err) { messageDiv.innerText = err.message; }
    });

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                const role = userDoc.data().role;
                if (role === 'admin' || role === 'lagos_sender') window.location.href = 'index.html';
                else if (role === 'abuja_rep') window.location.href = 'receive_abuja.html';
                else if (role === 'ph_rep') window.location.href = 'receive_ph.html';
            }
        }
    });
</script>
</body>
</html>
