<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>NEVAMAK – Picture Repository</title>

    <!-- Firebase SDK (for Auth) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js">
    </script>

    <!-- Google Identity Services (OAuth 2.0) -->
    <script src="https://accounts.google.com/gsi/client">
    </script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 12px; }
        .container { max-width: 1200px; margin: auto; }
        header { background: #0a3d62; color: white; padding: 12px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        header h1 { margin: 0; font-size: 1.4rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #3c6382; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; border: none; cursor: pointer; }
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .upload-area { border: 2px dashed #ccc; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #0a3d62; background: #f8f9fa; }
        .upload-area.dragover { border-color: #27ae60; background: #e8f5e9; }
        .upload-area input[type="file"] { display: none; }
        .upload-area .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .gallery-item { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: 0.2s; position: relative; }
        .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .gallery-item img { width: 100%; height: 180px; object-fit: cover; display: block; background: #f0f0f0; }
        .gallery-item .info { padding: 10px 12px; font-size: 0.85rem; }
        .gallery-item .info .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gallery-item .info .meta { color: #888; font-size: 0.75rem; margin-top: 4px; }
        .gallery-item .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(231,76,60,0.9); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        .gallery-item:hover .delete-btn { opacity: 1; }
        .gallery-item .delete-btn:hover { background: #e74c3c; transform: scale(1.1); }
        .loading { text-align: center; color: #888; padding: 40px; }
        .empty { text-align: center; color: #888; padding: 40px; font-size: 1.1rem; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 12px 24px; border-radius: 40px; font-size: 0.9rem; z-index: 999; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 12px; display: none; }
        .progress-bar .fill { height: 100%; width: 0%; background: #0a3d62; border-radius: 4px; transition: width 0.3s; }
        .auth-section { text-align: center; padding: 40px 20px; }
        .auth-section button { background: #0a3d62; color: white; border: none; padding: 12px 32px; border-radius: 48px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .folder-info { background: #e8f0fe; padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; color: #0a3d62; display: inline-block; }
        .btn-sm { padding: 4px 12px; border-radius: 40px; border: none; cursor: pointer; font-size: 0.8rem; }
        .btn-primary { background: #0a3d62; color: white; }
        .error-box { background: #fde8e8; border-left: 4px solid #e74c3c; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 0.9rem; color: #721c24; }
        @media (max-width: 600px) { .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } .gallery-item img { height: 140px; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Picture Repository</h1>
            <div class="nav-links">
                <a href="index.html">🏠 Dashboard</a>
                <a href="chat.html">💬 Chat</a>
                <a href="reports.html">📊 Reports</a>
                <a href="warehouse.html">🏚️ Warehouse</a>
                <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
            </div>
        </header>

        <div id="app">
            <!-- Auth Status -->
            <div class="card" id="authStatus">
                <div class="auth-section">
                    <p id="authMessage">Loading authentication...</p>
                    <div id="authButtons" style="margin-top:12px;"></div>
                </div>
            </div>

            <!-- Upload & Gallery -->
            <div id="mainContent" style="display:none;">
                <div class="card">
                    <h2>📤 Upload Images</h2>
                    <p style="color:#666; font-size:0.9rem; margin-bottom:12px;">
                        All uploads go to: <span class="folder-info">📁 NEVAMAK Picture Repository</span>
                    </p>
                    <div class="upload-area" id="dropZone">
                        <span class="icon">📷</span>
                        <p><strong>Drop images here</strong> or click to browse</p>
                        <p style="color:#888; font-size:0.8rem;">Supports JPG, PNG, GIF, WebP, SVG</p>
                        <input type="file" id="fileInput" accept="image/*" multiple />
                    </div>
                    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
                    <div id="uploadStatus" style="margin-top:8px; font-size:0.9rem; color:#888;"></div>
                </div>

                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
                        <h2 style="margin:0;">🖼️ Gallery</h2>
                        <button class="btn-sm btn-primary" id="refreshBtn">🔄 Refresh</button>
                    </div>
                    <div id="galleryContainer"><div class="loading">Loading images...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== Firebase Config ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
            authDomain: "nevamak-enterprises.firebaseapp.com",
            projectId: "nevamak-enterprises",
            storageBucket: "nevamak-enterprises.firebasestorage.app",
            messagingSenderId: "144324172534",
            appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
            measurementId: "G-MZ8NT6KK8N"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ==================== Google Drive Config ====================
        const DRIVE_FOLDER_ID = '1TjtzQiwAVLQ7ZPyDlBBNOq-xsbATAFwS';
        const CLIENT_ID = '442510200976-2iifvf15c8rha9jcie1mu46hbpv4l7ob.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        // ==================== DOM refs ====================
        const authMessage = document.getElementById('authMessage');
        const authButtons = document.getElementById('authButtons');
        const mainContent = document.getElementById('mainContent');
        const galleryContainer = document.getElementById('galleryContainer');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const uploadStatus = document.getElementById('uploadStatus');
        const refreshBtn = document.getElementById('refreshBtn');
        const toast = document.getElementById('toast');

        let tokenClient = null;
        let accessToken = null;
        let isSignedIn = false;

        // ==================== Toast helper ====================
        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        // ==================== Get access token (ensures fresh) ====================
        function getAccessToken() {
            return new Promise((resolve, reject) => {
                if (accessToken) {
                    resolve(accessToken);
                    return;
                }
                if (!tokenClient) {
                    reject(new Error('Token client not initialized.'));
                    return;
                }
                tokenClient.requestAccessToken({
                    prompt: 'none',
                    callback: (resp) => {
                        if (resp.error) {
                            reject(new Error(resp.error));
                            return;
                        }
                        accessToken = resp.access_token;
                        resolve(accessToken);
                    }
                });
            });
        }

        // ==================== Init Token Client ====================
        function initTokenClient() {
            if (typeof google === 'undefined' || !google.accounts) {
                console.warn('Google Identity Services not loaded');
                return;
            }
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error) {
                        console.error('Token error:', tokenResponse);
                        showToast('Google Sign-in error: ' + tokenResponse.error, 'error');
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    isSignedIn = true;
                    updateUI();
                    listFiles();
                    showToast('Connected to Google Drive!', 'success');
                },
            });
        }

        // ==================== Sign-in / Sign-out ====================
        function signIn() {
            if (!tokenClient) {
                showToast('Google API not ready. Please refresh.', 'error');
                return;
            }
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function signOut() {
            isSignedIn = false;
            accessToken = null;
            updateUI();
            galleryContainer.innerHTML = '<div class="empty">Signed out. Please sign in to view images.</div>';
            showToast('Signed out', '');
        }

        // ==================== Update UI ====================
        function updateUI() {
            if (isSignedIn && accessToken) {
                authMessage.textContent = '✅ Connected to Google Drive';
                authButtons.innerHTML = `<button onclick="signOut()" style="background:#e74c3c;">Sign Out</button>`;
                mainContent.style.display = 'block';
            } else {
                authMessage.textContent = '🔐 Sign in to Google Drive to upload and view images';
                authButtons.innerHTML = `<button onclick="signIn()">Sign in with Google</button>`;
                mainContent.style.display = 'none';
            }
        }

        // ==================== API request helpers ====================
        async function driveRequest(method, endpoint, body = null) {
            const token = await getAccessToken();
            const url = `https://www.googleapis.com/drive/v3/${endpoint}`;
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
            };
            const options = {
                method: method,
                headers: headers,
            };
            if (body) {
                options.body = JSON.stringify(body);
            }
            const response = await fetch(url, options);
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }
            return response.json();
        }

        // ==================== List files ====================
        async function listFiles() {
            if (!isSignedIn) {
                galleryContainer.innerHTML = '<div class="empty">Please sign in to view images.</div>';
                return;
            }

            galleryContainer.innerHTML = '<div class="loading">Loading images...</div>';

            try {
                const query = `'${DRIVE_FOLDER_ID}' in parents and mimeType contains 'image/'`;
                const fields = 'files(id,name,mimeType,size,createdTime,webContentLink)';
                const data = await driveRequest('GET', `files?q=${encodeURIComponent(query)}&fields=${fields}&pageSize=100&orderBy=createdTime desc`);

                const files = data.files || [];

                if (files.length === 0) {
                    galleryContainer.innerHTML = `
                        <div class="empty">
                            🖼️ No images found.<br>
                            <span style="font-size:0.85rem; color:#aaa;">Upload your first image above!</span>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="gallery">';
                files.forEach(file => {
                    const imgUrl = file.webContentLink || `https://drive.google.com/thumbnail?id=${file.id}`;
                    const size = file.size ? (file.size / 1024).toFixed(1) + ' KB' : '?';
                    const date = file.createdTime ? new Date(file.createdTime).toLocaleDateString() : '';
                    html += `
                        <div class="gallery-item" data-id="${file.id}">
                            <img src="${imgUrl}" alt="${file.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2216%22%3E${encodeURIComponent(file.name)}%3C/text%3E%3C/svg%3E'" />
                            <div class="info">
                                <div class="name" title="${file.name}">${file.name}</div>
                                <div class="meta">${size} · ${date}</div>
                            </div>
                            <button class="delete-btn" onclick="deleteFile('${file.id}')" title="Delete">✕</button>
                        </div>
                    `;
                });
                html += '</div>';
                galleryContainer.innerHTML = html;

            } catch (error) {
                console.error('List files error:', error);
                let errMsg = error.message || 'Unknown error';
                if (errMsg.includes('403')) {
                    errMsg = 'Permission denied. Ensure you have access to the folder and Drive API is enabled.';
                }
                galleryContainer.innerHTML = `<div class="empty">❌ Error loading images: ${errMsg}</div>`;
                showToast('Error loading images: ' + errMsg, 'error');
            }
        }

        // ==================== Upload ====================
        async function uploadFiles(files) {
            if (!isSignedIn) {
                showToast('Please sign in to Google Drive first.', 'error');
                return;
            }

            if (!files || files.length === 0) return;

            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            uploadStatus.textContent = `Uploading 0/${files.length}...`;

            let uploaded = 0;
            let errors = [];

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    const token = await getAccessToken();
                    const base64 = await readFileAsBase64(file);
                    const metadata = {
                        name: file.name,
                        parents: [DRIVE_FOLDER_ID],
                    };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    form.append('file', new Blob([base64], { type: 'application/octet-stream' }));

                    const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: form,
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                    }

                    uploaded++;
                    progressFill.style.width = Math.round((uploaded / files.length) * 100) + '%';
                    uploadStatus.textContent = `Uploading ${uploaded}/${files.length}...`;

                } catch (err) {
                    console.error(`Upload error for ${file.name}:`, err);
                    errors.push(`${file.name}: ${err.message}`);
                }
            }

            progressBar.style.display = 'none';
            uploadStatus.textContent = '';

            if (errors.length === 0) {
                showToast(`✅ Uploaded ${uploaded} file(s) successfully!`, 'success');
            } else {
                showToast(`⚠️ Uploaded ${uploaded}/${files.length}. Errors: ${errors.join('; ')}`, 'error');
            }

            listFiles();
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ==================== Delete ====================
        async function deleteFile(fileId) {
            if (!isSignedIn) {
                showToast('Please sign in.', 'error');
                return;
            }
            if (!confirm('Delete this image permanently?')) return;
            try {
                await driveRequest('DELETE', `files/${fileId}`);
                showToast('✅ Image deleted.', 'success');
                listFiles();
            } catch (error) {
                console.error('Delete error:', error);
                showToast('❌ Error deleting: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        // ==================== Drag & Drop ====================
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFiles(files);
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        refreshBtn.addEventListener('click', listFiles);

        // ==================== Init ====================
        async function init() {
            try {
                auth.onAuthStateChanged(async (user) => {
                    if (!user) {
                        window.location.href = 'login.html';
                        return;
                    }
                    // Load Google Identity Services if not already loaded
                    if (typeof google === 'undefined' || !google.accounts) {
                        // Script is already included in head, but just in case
                        console.warn('Google Identity Services not loaded; check internet connection.');
                    }
                    initTokenClient();
                    // Check if we have a stored token (from previous session)
                    // We'll rely on the token client to handle that.
                    // Update UI based on current state
                    updateUI();
                    // If already signed in (token from previous session), we might auto‑list
                    // But we'll let the user click Sign In.
                });
            } catch (err) {
                console.error('Init error:', err);
                authMessage.innerHTML = `
                    <div class="error-box">
                        ❌ Error: ${err.message}<br>
                        Please check your internet connection and refresh.
                    </div>
                `;
            }
        }

        // ==================== Expose globally ====================
        window.signIn = signIn;
        window.signOut = signOut;
        window.listFiles = listFiles;
        window.deleteFile = deleteFile;

        init();
        console.log('NEVAMAK Picture Repository loaded (no discovery docs).');
    </script>
</body>
</html>
