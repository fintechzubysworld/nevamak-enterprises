<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVAMAK – Port Harcourt Receiving</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        *{ font-family: system-ui, -apple-system; }
        body{ background: #eef2fa; margin: 0; padding: 12px; }
        .card, .shipment-card{ background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .shipment-card{ border-left: 6px solid #e67e22; }
        button{ background: #e67e22; color: white; padding: 12px 20px; border-radius: 48px; border: none; font-size: 1rem; width: 100%; margin-top: 8px; cursor: pointer; }
        input{ padding: 10px; border-radius: 40px; border: 1px solid #ccc; width: 100%; margin: 4px 0; }
        .nav{ display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .nav a, .logout-btn{ background: #2c3e50; color: white; padding: 8px 16px; border-radius: 40px; text-decoration: none; border: none; cursor: pointer; }
        .item-row{ background: #fef9e6; padding: 12px; border-radius: 20px; margin-bottom: 12px; }
        .cost-info{ background: #fff0db; padding: 8px; border-radius: 16px; margin: 8px 0; }
        .input-group{ display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .input-group input{ flex: 1; min-width: 80px; }
        h2{ font-size: 1.3rem; }
        @media (max-width: 500px) { .input-group { flex-direction: column; } .input-group input { width: 100%; } }
    </style>
</head>
<body>
<div class="nav">
    <a href="index.html">🏠 Dashboard</a>
    <a href="chat.html">💬 Chat</a>
    <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
</div>
<h2>🌊 Port Harcourt Receiving</h2>
<div id="phShipments" class="card">Loading...</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI", authDomain: "nevamak-enterprises.firebaseapp.com", projectId: "nevamak-enterprises", storageBucket: "nevamak-enterprises.firebasestorage.app", messagingSenderId: "144324172534", appId: "1:144324172534:web:4b6dd31754c79fd830aad7", measurementId: "G-MZ8NT6KK8N" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'login.html'; return; }
        loadPHShipments();
    });
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'login.html'));

    async function loadPHShipments() {
        const snap = await db.collection("shipments").where("destinationBranch","==","Portharcourt").where("status","in",["Dispatched","Partially Delivered"]).get();
        if(snap.empty) { document.getElementById("phShipments").innerHTML = "<div class='card'>No pending shipments</div>"; return; }
        let docs = []; snap.forEach(d => docs.push({id:d.id, data:d.data()}));
        docs.sort((a,b)=>(b.data.createdAt?.toDate()||0)-(a.data.createdAt?.toDate()||0));
        let html = "";
        for(const {id, data: ship} of docs){
            const items = ship.items;
            const totalGoods = items.reduce((s,i)=>s+(i.totalItemCost||0),0);
            html += `<div class="shipment-card" id="ph-${id}">
                        <h3>#${id.slice(0,8)} | ${ship.vehicleNo||"N/A"}<br>Sender: ${ship.senderName}</h3>
                        <div class="cost-info">🚛 Transport: ₦${(ship.transportCost||0).toLocaleString()} | Goods: ₦${totalGoods.toLocaleString()}</div>`;
            for(let idx=0; idx<items.length; idx++){
                const it = items[idx];
                const pending = it.orderedQty - (it.receivedQty + it.damageQty);
                html += `<div class="item-row">
                            <strong>${it.itemName}</strong> (₦${it.unitPrice?.toLocaleString()}/unit)<br>
                            Ordered: ${it.orderedQty} | OK: ${it.receivedQty} | Damaged: ${it.damageQty} | Pending: ${pending}
                            <div class="input-group">
                                <input type="number" id="ph_recv_${id}_${idx}" placeholder="+ Received" value="0" min="0" max="${pending}">
                                <input type="number" id="ph_dam_${id}_${idx}" placeholder="+ Damaged" value="0" min="0" max="${pending}">
                            </div>
                          </div>`;
            }
            html += `<div><input type="text" id="ph_rep_${id}" placeholder="Receiving Officer Name"></div>
                     <div><input type="text" id="ph_grn_${id}" placeholder="GRN Number"></div>
                     <button onclick="receivePH('${id}')">✅ Confirm Receipt</button>
                     </div>`;
        }
        document.getElementById("phShipments").innerHTML = html;
    }

    window.receivePH = async (shipId) => {
        const docRef = db.collection("shipments").doc(shipId);
        const doc = await docRef.get();
        const data = doc.data();
        let items = [...data.items];
        let updated = false;
        for(let i=0; i<items.length; i++){
            const addRecv = parseInt(document.getElementById(`ph_recv_${shipId}_${i}`)?.value || 0);
            const addDam = parseInt(document.getElementById(`ph_dam_${shipId}_${i}`)?.value || 0);
            if(addRecv>0 || addDam>0){
                updated = true;
                items[i].receivedQty = (items[i].receivedQty||0) + addRecv;
                items[i].damageQty = (items[i].damageQty||0) + addDam;
                if(items[i].receivedQty+items[i].damageQty > items[i].orderedQty){
                    alert(`Adjusting ${items[i].itemName}`);
                    items[i].damageQty = items[i].orderedQty - items[i].receivedQty;
                }
            }
        }
        if(!updated) return alert("Enter quantities");
        const officer = document.getElementById(`ph_rep_${shipId}`).value.trim();
        const grn = document.getElementById(`ph_grn_${shipId}`).value.trim();
        if(!officer) return alert("Enter receiving officer");
        const allDelivered = items.every(it => (it.receivedQty+it.damageQty) >= it.orderedQty);
        const finalStatus = allDelivered ? "Delivered" : "Partially Delivered";
        await docRef.update({ items, status:finalStatus, receivedDate: firebase.firestore.FieldValue.serverTimestamp(), receivingRep:officer, grnNumber:grn||`GRN-PH-${Date.now()}` });
        alert(`Port Harcourt: ${finalStatus}`);
        loadPHShipments();
    };
</script>
</body>
</html>
