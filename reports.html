<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Reports & Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 12px; }
        .container { max-width: 1300px; margin: auto; }
        header { background: #0a3d62; color: white; padding: 12px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        header h1 { margin: 0; font-size: 1.4rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #3c6382; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; border: none; cursor: pointer; }
        .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
        .tab-btn { background: #ccc; color: #333; padding: 8px 16px; border-radius: 40px; border: none; cursor: pointer; font-weight: 500; }
        .tab-btn.active { background: #0a3d62; color: white; }
        .tab-content { display: none; background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filters input, .filters select { padding: 8px 16px; border-radius: 40px; border: 1px solid #ccc; }
        .filters button { padding: 8px 20px; border-radius: 40px; border: none; background: #0a3d62; color: white; cursor: pointer; }
        .filters button.export { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: 600; }
        .badge { background: #e2e3e5; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .status-dispatched { background: #ffeaa7; color: #b85c00; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-partial { background: #fff3cd; color: #856404; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .scroll { overflow-x: auto; }
        .empty { text-align: center; color: #888; padding: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; max-width: 800px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 1.8rem; }
        .invoice-box { border: 1px solid #ddd; padding: 16px; background: white; border-radius: 16px; }
        .invoice-box table { width: 100%; border-collapse: collapse; }
        .invoice-box th, .invoice-box td { border: 1px solid #ddd; padding: 8px; }
        .btn-sm { padding: 4px 12px; border-radius: 40px; border: none; cursor: pointer; font-size: 0.8rem; }
        .btn-success { background: #27ae60; color: white; }
        .btn-primary { background: #0a3d62; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-info { background: #3498db; color: white; }
        .permission-error { background: #f8d7da; border-left: 4px solid #e74c3c; padding: 16px; border-radius: 12px; margin: 12px 0; }
        .permission-error a { color: #0a3d62; font-weight: 600; }
        .permission-error .index-link { word-break: break-all; }
        @media (max-width: 600px) { .filters { flex-direction: column; align-items: stretch; } .filters input, .filters select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📊 Reports & Analytics</h1>
        <div class="nav-links">
            <a href="index.html">🏠 Dashboard</a>
            <a href="chat.html">💬 Chat</a>
            <a href="invoice_repo.html">🧾 Invoice Repo</a>
            <a href="picture_repo.html">🖼️ Pictures</a>
            <a href="permissions.html">🔐 Permissions</a>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="invoices">🧾 Invoices</button>
        <button class="tab-btn" data-tab="returns">🔄 Returns</button>
        <button class="tab-btn" data-tab="dispatched">📦 Dispatched</button>
        <button class="tab-btn" data-tab="received">📥 Received</button>
        <button class="tab-btn" data-tab="chat">💬 Chat History</button>
    </div>

    <!-- Invoices Tab -->
    <div id="tab-invoices" class="tab-content active">
        <div class="filters">
            <input type="date" id="invDateStart">
            <input type="date" id="invDateEnd">
            <select id="invBranch"><option value="">All Branches</option><option value="Abuja">Abuja</option><option value="Portharcourt">Port Harcourt</option></select>
            <button id="invFilterBtn">Filter</button>
            <button class="export" onclick="exportCSV('invTable')">📄 Export CSV</button>
        </div>
        <div id="invoiceList">Loading...</div>
    </div>

    <!-- Returns Tab -->
    <div id="tab-returns" class="tab-content">
        <div class="filters">
            <input type="date" id="retDateStart">
            <input type="date" id="retDateEnd">
            <select id="retBranch"><option value="">All Branches</option><option value="Abuja">Abuja</option><option value="Portharcourt">Port Harcourt</option></select>
            <button id="retFilterBtn">Filter</button>
            <button class="export" onclick="exportCSV('retTable')">📄 Export CSV</button>
        </div>
        <div id="returnsList">Loading...</div>
    </div>

    <!-- Dispatched Tab -->
    <div id="tab-dispatched" class="tab-content">
        <div class="filters">
            <input type="date" id="dispDateStart">
            <input type="date" id="dispDateEnd">
            <select id="dispStatus"><option value="">All Status</option><option value="Dispatched">Dispatched</option><option value="Delivered">Delivered</option><option value="Partially Delivered">Partial</option><option value="Rejected">Rejected</option></select>
            <button id="dispFilterBtn">Filter</button>
            <button class="export" onclick="exportCSV('dispTable')">📄 Export CSV</button>
        </div>
        <div id="dispatchedList">Loading...</div>
    </div>

    <!-- Received Tab -->
    <div id="tab-received" class="tab-content">
        <div class="filters">
            <input type="date" id="recvDateStart">
            <input type="date" id="recvDateEnd">
            <select id="recvBranch"><option value="">All Branches</option><option value="Abuja">Abuja</option><option value="Portharcourt">Port Harcourt</option></select>
            <button id="recvFilterBtn">Filter</button>
            <button class="export" onclick="exportCSV('recvTable')">📄 Export CSV</button>
        </div>
        <div id="receivedList">Loading...</div>
    </div>

    <!-- Chat History Tab -->
    <div id="tab-chat" class="tab-content">
        <div class="filters">
            <input type="date" id="chatDateStart">
            <input type="date" id="chatDateEnd">
            <input type="text" id="chatSearch" placeholder="🔍 Search messages...">
            <button id="chatFilterBtn">Filter</button>
            <button class="export" onclick="exportCSV('chatTable')">📄 Export CSV</button>
        </div>
        <div id="chatList">Loading...</div>
    </div>

    <!-- Invoice Modal -->
    <div id="invoiceModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('invoiceModal')">&times;</span>
            <div id="invoiceContent"></div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
                <button id="printInvoiceBtn" onclick="window.print()" style="background:#0a3d62; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">🖨️ Print</button>
                <button id="downloadInvoiceBtn" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">📥 Download PDF</button>
                <button id="saveToRepositoryBtn" style="background:#8e44ad; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">💾 Save to Invoice Repository</button>
            </div>
            <div id="saveMessage" style="color:green; margin-top:8px; text-align:center;"></div>
        </div>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentRole = '';
    let currentShipmentId = null; // to reference the shipment when saving

    // ==================== Auth ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        const userDoc = await db.collection('users').doc(user.uid).get();
        currentRole = userDoc.data()?.role || '';
        // If vendor, redirect away
        if (currentRole === 'vendor' || currentRole === 'external_vendor') {
            alert('Access denied. Vendors cannot view reports.');
            window.location.href = 'external_vendor.html';
            return;
        }
        // Load all tabs with role-based filtering
        loadInvoices();
        loadReturns();
        loadDispatched();
        loadReceived();
        loadChatHistory();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'login.html'));

    // ==================== Tab Switching ====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });

    // ==================== Utility: Export CSV ====================
    function exportCSV(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return alert('No data to export.');
        let csv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td, th');
            const rowData = [];
            cols.forEach(col => rowData.push('"' + col.innerText.replace(/"/g, '""') + '"'));
            csv += rowData.join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${tableId}_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    // ==================== Build Role-Based Query ====================
    function addRoleFilter(q, branchField = 'destinationBranch') {
        if (currentRole === 'admin' || currentRole === 'lagos_sender') {
            // No filter needed; can see all
            return q;
        } else if (currentRole === 'abuja_rep') {
            // Abuja rep sees only Abuja branch
            return q.where(branchField, '==', 'Abuja');
        } else if (currentRole === 'ph_rep') {
            // PH rep sees only Port Harcourt branch
            return q.where(branchField, '==', 'Portharcourt');
        } else {
            // If any other role, deny access (should not happen)
            return q.limit(0); // force empty result
        }
    }

    // ==================== Invoices ====================
    async function loadInvoices() {
        const container = document.getElementById('invoiceList');
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> Loading...</div>';
        try {
            const start = document.getElementById('invDateStart').value;
            const end = document.getElementById('invDateEnd').value;
            const branch = document.getElementById('invBranch').value;
            let q = db.collection('shipments')
                        .where('status', '==', 'Delivered')
                        .where('grnNumber', '!=', null);
            // Role filtering
            q = addRoleFilter(q);
            if (start) q = q.where('receivedDate', '>=', new Date(start));
            if (end) {
                const endDate = new Date(end);
                endDate.setHours(23,59,59);
                q = q.where('receivedDate', '<=', endDate);
            }
            if (branch && (currentRole === 'admin' || currentRole === 'lagos_sender')) {
                q = q.where('destinationBranch', '==', branch);
            }
            // Branch filter for branch reps is already applied via addRoleFilter
            // But if they select a branch in the dropdown, respect it (but they only have one branch)
            // For branch reps, branch filter is forced, so dropdown won't matter much

            const snap = await q.get();
            if (snap.empty) {
                container.innerHTML = '<p class="empty">No invoices found. Try adjusting filters.</p>';
                return;
            }
            let html = '<table id="invTable"><tr><th>GRN</th><th>Date</th><th>Branch</th><th>Supplier</th><th>Total Goods</th><th>Transport</th><th>Action</th></tr>';
            snap.forEach(doc => {
                const d = doc.data();
                const totalGoods = d.items ? d.items.reduce((s,i) => s + (i.totalItemCost||0), 0) : 0;
                html += `<tr>
                    <td>${d.grnNumber || 'N/A'}</td>
                    <td>${d.receivedDate ? new Date(d.receivedDate.toDate()).toLocaleDateString() : ''}</td>
                    <td>${d.destinationBranch}</td>
                    <td>${d.senderName}</td>
                    <td>₦${totalGoods.toLocaleString()}</td>
                    <td>₦${(d.transportCost||0).toLocaleString()}</td>
                    <td><button onclick="viewInvoice('${doc.id}')" style="background:#f39c12; border:none; color:white; padding:4px 16px; border-radius:40px; cursor:pointer;">Preview</button></td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (error) {
            console.error('Invoices load error:', error);
            let errorHtml = `<div class="permission-error">
                <strong>⚠️ Error loading invoices:</strong> ${error.message}
                ${error.message && error.message.includes('https://console.firebase.google.com') ? 
                    `<br><br><strong>🔗 Create Required Index:</strong><br>
                     <a href="${error.message.match(/https:\/\/console\.firebase\.google\.com\/[^\s]+/)[0]}" target="_blank" style="color:#0a3d62;">Click here to create index</a>` : ''}
            </div>`;
            container.innerHTML = errorHtml;
        }
    }

    window.viewInvoice = async (shipId) => {
        try {
            const doc = await db.collection('shipments').doc(shipId).get();
            if (!doc.exists) return;
            currentShipmentId = shipId;
            const d = doc.data();
            const items = d.items || [];
            let itemsHtml = '';
            items.forEach(it => {
                itemsHtml += `<tr><td>${it.itemName}</td><td>${it.orderedQty}</td><td>₦${it.unitPrice?.toLocaleString()}</td><td>₦${(it.totalItemCost||0).toLocaleString()}</td></tr>`;
            });
            const totalGoods = items.reduce((s,i) => s + (i.totalItemCost||0), 0);
            const html = `
                <div id="invoiceContentInner">
                    <h2>NEVAMAK Enterprises</h2>
                    <h3>Goods Received Note (GRN)</h3>
                    <p><strong>GRN:</strong> ${d.grnNumber || 'N/A'}</p>
                    <p><strong>Date:</strong> ${d.receivedDate ? new Date(d.receivedDate.toDate()).toLocaleString() : 'N/A'}</p>
                    <p><strong>Supplier:</strong> ${d.senderName}</p>
                    <p><strong>Branch:</strong> ${d.destinationBranch}</p>
                    <p><strong>Vehicle:</strong> ${d.vehicleNo || 'N/A'}</p>
                    <p><strong>Transport Cost:</strong> ₦${(d.transportCost||0).toLocaleString()}</p>
                    <table border="1" cellpadding="5" style="width:100%; border-collapse:collapse;">
                        <tr><th>Item</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>
                        ${itemsHtml}
                        <tr><td colspan="3"><strong>Total Goods</strong></td><td><strong>₦${totalGoods.toLocaleString()}</strong></td></tr>
                    </table>
                    <p><em>Received by: ${d.receivingRep}</em></p>
                    <p>This is a system-generated invoice.</p>
                </div>
            `;
            document.getElementById('invoiceContent').innerHTML = html;
            document.getElementById('saveMessage').innerText = '';
            document.getElementById('invoiceModal').style.display = 'flex';
        } catch (error) {
            alert('Error loading invoice: ' + error.message);
        }
    };

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    };

    document.getElementById('saveToRepositoryBtn').addEventListener('click', async () => {
        if (!currentShipmentId) {
            alert('No invoice loaded.');
            return;
        }
        try {
            const doc = await db.collection('shipments').doc(currentShipmentId).get();
            if (!doc.exists) return alert('Shipment not found.');
            const d = doc.data();
            const items = (d.items || []).map(it => ({
                itemName: it.itemName,
                quantity: it.orderedQty || 0,
                unitPrice: it.unitPrice || 0,
                total: (it.orderedQty || 0) * (it.unitPrice || 0)
            }));
            const total = items.reduce((sum, i) => sum + i.total, 0);
            const invoiceData = {
                invoiceNumber: d.grnNumber || 'INV-' + Date.now().toString(36).toUpperCase(),
                date: d.receivedDate ? new Date(d.receivedDate.toDate()).toISOString().slice(0,10) : new Date().toISOString().slice(0,10),
                customer: d.senderName || 'N/A',
                customerEmail: '',
                notes: `Generated from GRN ${d.grnNumber}`,
                items: items,
                total: total,
                createdBy: currentUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('invoices').add(invoiceData);
            document.getElementById('saveMessage').innerText = '✅ Invoice saved to repository!';
            setTimeout(() => { document.getElementById('saveMessage').innerText = ''; }, 5000);
        } catch (error) {
            alert('Error saving to repository: ' + error.message);
        }
    });

    document.getElementById('downloadInvoiceBtn').addEventListener('click', async () => {
        const element = document.getElementById('invoiceContentInner');
        if (!element) return alert('No invoice to download.');
        try {
            const canvas = await html2canvas(element, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 190;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
            pdf.save(`Invoice_${new Date().toISOString().slice(0,10)}.pdf`);
        } catch (error) {
            alert('Error generating PDF: ' + error.message);
        }
    });

    // ==================== Returns ====================
    async function loadReturns() {
        const container = document.getElementById('returnsList');
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> Loading...</div>';
        try {
            const start = document.getElementById('retDateStart').value;
            const end = document.getElementById('retDateEnd').value;
            const branch = document.getElementById('retBranch').value;
            let q = db.collection('returns');
            // Role filtering: use branch field (returns have a 'branch' field)
            q = addRoleFilter(q, 'branch');
            if (start) q = q.where('date', '>=', new Date(start));
            if (end) {
                const endDate = new Date(end);
                endDate.setHours(23,59,59);
                q = q.where('date', '<=', endDate);
            }
            if (branch && (currentRole === 'admin' || currentRole === 'lagos_sender')) {
                q = q.where('branch', '==', branch);
            }
            const snap = await q.get();
            let docs = [];
            snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            docs.sort((a, b) => (b.date?.toDate() || 0) - (a.date?.toDate() || 0));
            if (docs.length === 0) {
                container.innerHTML = '<p class="empty">No returns found.</p>';
                return;
            }
            let html = '<table id="retTable"><tr><th>Date</th><th>Branch</th><th>Shipment</th><th>Item</th><th>Qty</th><th>Reason</th><th>By</th></tr>';
            docs.forEach(r => {
                html += `<tr>
                    <td>${r.date ? new Date(r.date.toDate()).toLocaleDateString() : ''}</td>
                    <td>${r.branch}</td>
                    <td>${r.shipmentId?.slice(0,8) || ''}</td>
                    <td>${r.itemName}</td>
                    <td>${r.returnedQty}</td>
                    <td>${r.reason || '-'}</td>
                    <td>${r.createdBy || '-'}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (error) {
            console.error('Returns load error:', error);
            let errorHtml = `<div class="permission-error"><strong>⚠️ Error loading returns:</strong> ${error.message}</div>`;
            container.innerHTML = errorHtml;
        }
    }

    // ==================== Dispatched ====================
    async function loadDispatched() {
        const container = document.getElementById('dispatchedList');
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> Loading...</div>';
        try {
            const start = document.getElementById('dispDateStart').value;
            const end = document.getElementById('dispDateEnd').value;
            const status = document.getElementById('dispStatus').value;
            let q = db.collection('shipments');
            q = addRoleFilter(q);
            if (start) q = q.where('createdAt', '>=', new Date(start));
            if (end) {
                const endDate = new Date(end);
                endDate.setHours(23,59,59);
                q = q.where('createdAt', '<=', endDate);
            }
            if (status) q = q.where('status', '==', status);
            const snap = await q.get();
            let docs = [];
            snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            docs.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
            if (docs.length === 0) {
                container.innerHTML = '<p class="empty">No dispatched shipments found.</p>';
                return;
            }
            let html = '<table id="dispTable"><tr><th>ID</th><th>Date</th><th>Destination</th><th>Sender</th><th>Items</th><th>Goods Value</th><th>Status</th></tr>';
            docs.forEach(d => {
                const itemsShort = d.items ? d.items.map(i => `${i.itemName}(${i.orderedQty})`).join(", ").substring(0,40) : '-';
                const totalGoods = d.items ? d.items.reduce((s,i) => s + (i.totalItemCost||0), 0) : 0;
                const statusClass = `status-${d.status?.toLowerCase().replace(/\s/g,'') || 'dispatched'}`;
                html += `<tr>
                    <td>${d.id.slice(0,8)}</td>
                    <td>${d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString() : ''}</td>
                    <td>${d.destinationBranch}</td>
                    <td>${d.senderName}</td>
                    <td>${itemsShort}</td>
                    <td>₦${totalGoods.toLocaleString()}</td>
                    <td><span class="status-badge ${statusClass}">${d.status}</span></td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (error) {
            console.error('Dispatched load error:', error);
            let errorHtml = `<div class="permission-error"><strong>⚠️ Error loading dispatched:</strong> ${error.message}</div>`;
            container.innerHTML = errorHtml;
        }
    }

    // ==================== Received ====================
    async function loadReceived() {
        const container = document.getElementById('receivedList');
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> Loading...</div>';
        try {
            const start = document.getElementById('recvDateStart').value;
            const end = document.getElementById('recvDateEnd').value;
            const branch = document.getElementById('recvBranch').value;
            let q = db.collection('shipments')
                        .where('status', 'in', ['Delivered', 'Partially Delivered']);
            q = addRoleFilter(q);
            if (start) q = q.where('receivedDate', '>=', new Date(start));
            if (end) {
                const endDate = new Date(end);
                endDate.setHours(23,59,59);
                q = q.where('receivedDate', '<=', endDate);
            }
            if (branch && (currentRole === 'admin' || currentRole === 'lagos_sender')) {
                q = q.where('destinationBranch', '==', branch);
            }
            const snap = await q.get();
            let docs = [];
            snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            docs.sort((a, b) => (b.receivedDate?.toDate() || 0) - (a.receivedDate?.toDate() || 0));
            if (docs.length === 0) {
                container.innerHTML = '<p class="empty">No received shipments found.</p>';
                return;
            }
            let html = '<table id="recvTable"><tr><th>Date</th><th>Branch</th><th>GRN</th><th>Supplier</th><th>Items</th><th>Goods Value</th><th>Received By</th></tr>';
            docs.forEach(d => {
                const itemsShort = d.items ? d.items.map(i => `${i.itemName}(${i.receivedQty||0})`).join(", ").substring(0,40) : '-';
                const totalGoods = d.items ? d.items.reduce((s,i) => s + (i.totalItemCost||0), 0) : 0;
                html += `<tr>
                    <td>${d.receivedDate ? new Date(d.receivedDate.toDate()).toLocaleDateString() : ''}</td>
                    <td>${d.destinationBranch}</td>
                    <td>${d.grnNumber || 'N/A'}</td>
                    <td>${d.senderName}</td>
                    <td>${itemsShort}</td>
                    <td>₦${totalGoods.toLocaleString()}</td>
                    <td>${d.receivingRep || '-'}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (error) {
            console.error('Received load error:', error);
            let errorHtml = `<div class="permission-error"><strong>⚠️ Error loading received:</strong> ${error.message}</div>`;
            container.innerHTML = errorHtml;
        }
    }

    // ==================== Chat History ====================
    async function loadChatHistory() {
        const container = document.getElementById('chatList');
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> Loading...</div>';
        try {
            const start = document.getElementById('chatDateStart').value;
            const end = document.getElementById('chatDateEnd').value;
            const search = document.getElementById('chatSearch').value.toLowerCase().trim();
            // Chat messages are per user; we only see messages sent by this user (or global)
            // But we want to see all messages the user participated in.
            // Security rules restrict to messages where chatId contains user uid.
            // So we can query messages where senderId == currentUser.uid (sent messages)
            // Or where chatId contains currentUser.uid (received messages)
            // For simplicity, we'll query messages where senderId == currentUser.uid
            // and also messages where chatId contains currentUser.uid (to see received).
            // Actually better: query messages where chatId == 'global' or chatId contains currentUser.uid
            let q = db.collection('messages')
                        .where('chatId', 'in', ['global', currentUser.uid + '_any']) // can't use in with dynamic. We'll use simple query.
                        .orderBy('timestamp', 'desc');
            // Better approach: query all messages and filter client-side? Not efficient.
            // Let's just query messages where senderId == currentUser.uid (sent messages) and also messages where chatId contains currentUser.uid.
            // Since we can't do complex OR, we'll combine two queries.
            // For now, we'll just fetch messages where senderId == currentUser.uid (sent messages).
            // This limits to user's own sent messages, but we want all their chat history.
            // We'll modify to include all messages where user is participant (chatId contains uid).
            // We'll need a composite index on chatId and timestamp.
            // Since that may not exist, we'll query all messages and filter client-side.
            // But that would require read access to all messages, which is denied by rules.
            // So the correct approach: query messages where chatId contains currentUser.uid.
            // We'll use a workaround: query where chatId >= currentUser.uid and chatId <= currentUser.uid + '\uf8ff' (prefix search)
            // But chatId format is e.g., "uid1_uid2". So we can query where chatId starts with currentUser.uid.
            // That will get all chats where user is first part. For chats where user is second part, we need another query.
            // This is complex. Since this is a reports page and we want to show chat history for the user,
            // we can simply query messages where senderId == currentUser.uid (sent messages) and also messages where receiverId == currentUser.uid (if we had that field).
            // Without receiverId, we'll just show sent messages for now, plus global chat.
            // We'll modify to get global messages as well.
            // Simpler: fetch messages where senderId == currentUser.uid (sent) and also where chatId == 'global'.
            // Global messages are public; user can read them.
            // We'll combine two queries manually.
            let sentSnapshot = await db.collection('messages')
                                        .where('senderId', '==', currentUser.uid)
                                        .orderBy('timestamp', 'desc')
                                        .limit(100)
                                        .get();
            let globalSnapshot = await db.collection('messages')
                                          .where('chatId', '==', 'global')
                                          .orderBy('timestamp', 'desc')
                                          .limit(100)
                                          .get();
            let docs = [];
            sentSnapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            globalSnapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
            // Remove duplicates
            const uniqueDocs = Array.from(new Map(docs.map(d => [d.id, d])).values());
            uniqueDocs.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));
            if (search) {
                const filtered = uniqueDocs.filter(m => (m.text || '').toLowerCase().includes(search));
                docs = filtered;
            } else {
                docs = uniqueDocs;
            }
            if (docs.length === 0) {
                container.innerHTML = '<p class="empty">No messages found.</p>';
                return;
            }
            let html = '<table id="chatTable"><tr><th>Time</th><th>Chat</th><th>Text</th><th>File</th></tr>';
            docs.forEach(m => {
                let chatDisplay = 'Global';
                if (m.chatId !== 'global') {
                    const parts = m.chatId.split('_');
                    const other = parts.find(p => p !== currentUser.uid);
                    if (other) chatDisplay = other.slice(0,6);
                    else chatDisplay = m.chatId;
                }
                const text = m.text || '';
                const file = m.fileName ? `📎 ${m.fileName}` : '';
                html += `<tr>
                    <td>${m.timestamp ? new Date(m.timestamp.toDate()).toLocaleString() : ''}</td>
                    <td>${chatDisplay}</td>
                    <td>${text}</td>
                    <td>${file}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (error) {
            console.error('Chat history load error:', error);
            let errorHtml = `<div class="permission-error"><strong>⚠️ Error loading chat history:</strong> ${error.message}</div>`;
            container.innerHTML = errorHtml;
        }
    }

    // ==================== Filter listeners ====================
    document.getElementById('invFilterBtn').addEventListener('click', loadInvoices);
    document.getElementById('retFilterBtn').addEventListener('click', loadReturns);
    document.getElementById('dispFilterBtn').addEventListener('click', loadDispatched);
    document.getElementById('recvFilterBtn').addEventListener('click', loadReceived);
    document.getElementById('chatFilterBtn').addEventListener('click', loadChatHistory);
    document.getElementById('chatSearch').addEventListener('input', loadChatHistory);

    console.log('NEVAMAK Reports loaded with role-based filtering and error handling.');
</script>
</body>
