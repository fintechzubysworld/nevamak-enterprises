<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Shop Floor Inventory</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: #eef2fa; margin: 0; padding: 12px; }
        .container { max-width: 1300px; margin: auto; }
        header { background: #8e44ad; color: white; padding: 12px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        header h1 { margin: 0; font-size: 1.4rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #6c3483; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; border: none; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left: 4px solid #8e44ad; }
        .stat-card h4 { margin: 0 0 4px; font-size: 0.8rem; color: #555; }
        .stat-card .num { font-size: 1.5rem; font-weight: bold; color: #8e44ad; }
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filters input, .filters select { padding: 8px 16px; border-radius: 40px; border: 1px solid #ccc; }
        .filters button { padding: 8px 20px; border-radius: 40px; border: none; background: #8e44ad; color: white; cursor: pointer; }
        .filters button.export { background: #27ae60; }
        .filters button.clear { background: #e74c3c; }
        .section-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: 600; }
        .badge { background: #e2e3e5; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; max-width: 500px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 1.8rem; }
        .btn-sm { padding: 4px 12px; border-radius: 40px; border: none; cursor: pointer; font-size: 0.8rem; }
        .btn-primary { background: #0a3d62; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-return { background: #e67e22; color: white; }
        @media (max-width: 600px) { .filters { flex-direction: column; align-items: stretch; } .filters input, .filters select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏪 Shop Floor Inventory</h1>
        <div class="nav-links">
            <a href="index.html">🏠 Dashboard</a>
            <a href="chat.html">💬 Chat</a>
            <a href="reports.html">📊 Reports</a>
            <a href="warehouse.html">🏚️ Warehouse</a>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><h4>Total Items</h4><div class="num" id="totalItems">-</div></div>
        <div class="stat-card"><h4>Total Stock</h4><div class="num" id="totalStock">-</div></div>
        <div class="stat-card"><h4>Branches</h4><div class="num" id="branchCount">-</div></div>
        <div class="stat-card"><h4>Total Stock Value (₦)</h4><div class="num" id="totalStockValue">-</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="searchItem" placeholder="🔍 Search by item...">
        <select id="filterBranch">
            <option value="all">All Branches</option>
            <option value="Abuja">Abuja</option>
            <option value="Portharcourt">Port Harcourt</option>
            <option value="Lagos">Lagos</option>
        </select>
        <select id="filterCategory">
            <option value="all">All Categories</option>
            <option value="Pot">Pot</option>
            <option value="Stainless">Stainless</option>
            <option value="Kettle">Kettle</option>
            <option value="Non-Stick">Non-Stick</option>
            <option value="Other">Other</option>
        </select>
        <input type="date" id="filterDateFrom" placeholder="From">
        <input type="date" id="filterDateTo" placeholder="To">
        <button id="applyFiltersBtn">🔍 Search</button>
        <button id="clearFiltersBtn" class="clear">✖ Clear</button>
        <button class="export" onclick="exportCSV('floorTable')">📄 Export CSV</button>
        <a href="warehouse.html" style="background:#0a3d62; color:white; padding:8px 20px; border-radius:40px; text-decoration:none;">🏚️ Back to Warehouse</a>
    </div>

    <!-- Shop Floor Table -->
    <div class="section-card">
        <div id="floorList">Loading shop floor inventory...</div>
    </div>
</div>

<!-- Return to Warehouse Modal -->
<div id="returnWarehouseModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('returnWarehouseModal')">&times;</span>
        <h3>🏚️ Return to Warehouse</h3>
        <p><strong>Item:</strong> <span id="returnItemName"></span></p>
        <p><strong>Current Shop Floor Stock:</strong> <span id="returnCurrentStock"></span></p>
        <p><strong>Unit Price:</strong> ₦<span id="returnUnitPrice"></span></p>
        <p><strong>Branch:</strong> <span id="returnBranch"></span></p>
        <p><strong>Category:</strong> <span id="returnCategory"></span></p>
        <input type="number" id="returnQuantity" placeholder="Quantity to return" min="1">
        <textarea id="returnReason" placeholder="Reason for return (e.g., defective, overstock)" rows="2"></textarea>
        <button id="returnConfirmBtn" class="btn-return" style="width:100%; padding:12px; border-radius:48px; border:none; color:white; font-weight:bold; margin-top:12px;">↩️ Return to Warehouse</button>
        <div id="returnMessage" style="color:red; margin-top:8px;"></div>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentUserRole = '';
    let currentUserEmail = '';
    let floorData = [];
    let returnItemData = {};

    // ==================== Auth ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        currentUserEmail = user.email;
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
            currentUserRole = userDoc.data().role || '';
        }
        loadFloorInventory();
        loadStats();
        document.getElementById('applyFiltersBtn').addEventListener('click', loadFloorInventory);
        document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'login.html'));

    // ==================== Clear Filters ====================
    function clearFilters() {
        document.getElementById('searchItem').value = '';
        document.getElementById('filterBranch').value = 'all';
        document.getElementById('filterCategory').value = 'all';
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        loadFloorInventory();
    }

    // ==================== Load Shop Floor Data ====================
    function loadFloorInventory() {
        const searchInput = document.getElementById('searchItem');
        const branchFilter = document.getElementById('filterBranch');
        const categoryFilter = document.getElementById('filterCategory');
        const dateFrom = document.getElementById('filterDateFrom').value;
        const dateTo = document.getElementById('filterDateTo').value;

        let allowedBranches = [];
        if (currentUserRole === 'admin' || currentUserRole === 'lagos_sender') {
            allowedBranches = ['Abuja', 'Portharcourt', 'Lagos'];
        } else if (currentUserRole === 'abuja_rep') {
            allowedBranches = ['Abuja'];
        } else if (currentUserRole === 'ph_rep') {
            allowedBranches = ['Portharcourt'];
        } else {
            allowedBranches = ['Abuja', 'Portharcourt', 'Lagos'];
        }

        db.collection('shopFloor').onSnapshot((snapshot) => {
            let docs = [];
            snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

            // Role-based branch filtering
            docs = docs.filter(d => allowedBranches.includes(d.branch));

            // Search by item name
            const search = searchInput.value.toLowerCase().trim();
            if (search) {
                docs = docs.filter(d => (d.itemName || '').toLowerCase().includes(search));
            }

            // Filter by branch
            const branchVal = branchFilter.value;
            if (branchVal !== 'all') {
                docs = docs.filter(d => d.branch === branchVal);
            }

            // Filter by category
            const categoryVal = categoryFilter.value;
            if (categoryVal !== 'all') {
                docs = docs.filter(d => (d.category || 'Other') === categoryVal);
            }

            // Filter by date range (lastUpdated)
            if (dateFrom) {
                const fromDate = new Date(dateFrom);
                fromDate.setHours(0,0,0,0);
                docs = docs.filter(d => {
                    if (!d.lastUpdated) return false;
                    const updated = d.lastUpdated.toDate();
                    return updated >= fromDate;
                });
            }
            if (dateTo) {
                const toDate = new Date(dateTo);
                toDate.setHours(23,59,59,999);
                docs = docs.filter(d => {
                    if (!d.lastUpdated) return false;
                    const updated = d.lastUpdated.toDate();
                    return updated <= toDate;
                });
            }

            docs.sort((a, b) => {
                if (a.branch !== b.branch) return a.branch.localeCompare(b.branch);
                return (a.itemName || '').localeCompare(b.itemName || '');
            });

            floorData = docs;

            if (docs.length === 0) {
                document.getElementById('floorList').innerHTML = '<p class="empty" style="text-align:center; color:#888; padding:20px;">No items on shop floor.</p>';
                updateStats([]);
                return;
            }

            const canReturn = (currentUserRole === 'admin' || currentUserRole === 'lagos_sender' ||
                               currentUserRole === 'abuja_rep' || currentUserRole === 'ph_rep');

            let html = `<table id="floorTable">
                <tr>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Branch</th>
                    <th>Stock</th>
                    <th>Unit Price</th>
                    <th>Location</th>
                    <th>Last Updated</th>
                    ${canReturn ? '<th>Actions</th>' : ''}
                </tr>`;
            docs.forEach(d => {
                const category = d.category || 'Other';
                const location = d.location || 'Floor';
                const lastUpdated = d.lastUpdated ? new Date(d.lastUpdated.toDate()).toLocaleString() : 'N/A';
                html += `<tr>
                    <td><strong>${d.itemName}</strong></td>
                    <td>${category}</td>
                    <td>${d.branch}</td>
                    <td>${d.stock}</td>
                    <td>₦${(d.unitPrice || 0).toLocaleString()}</td>
                    <td>${location}</td>
                    <td>${lastUpdated}</td>
                    ${canReturn ? `
                    <td>
                        <button class="btn-sm btn-return" onclick="openReturnModal('${d.id}','${d.itemName}','${d.branch}',${d.stock},${d.unitPrice},'${category}')">↩️ Return to Warehouse</button>
                    </td>` : ''}
                </tr>`;
            });
            html += '</table>';
            document.getElementById('floorList').innerHTML = html;
            updateStats(docs);
        }, (error) => {
            console.error('Shop floor listener error:', error);
            if (error.code === 'permission-denied') {
                document.getElementById('floorList').innerHTML = `
                    <p style="color:red; text-align:center; padding:20px;">
                        ⚠️ Permission denied. Please ensure Firestore rules allow read access to 'shopFloor'.
                    </p>
                `;
            } else {
                document.getElementById('floorList').innerHTML = `<p style="color:red;">Error loading shop floor: ${error.message}</p>`;
            }
        });
    }

    // ==================== Stats ====================
    function updateStats(docs) {
        if (!docs) docs = floorData;
        let totalItems = docs.length;
        let totalStock = docs.reduce((sum, d) => sum + (d.stock || 0), 0);
        let branches = new Set(docs.map(d => d.branch));
        let totalStockValue = docs.reduce((sum, d) => sum + ((d.stock || 0) * (d.unitPrice || 0)), 0);
        document.getElementById('totalItems').innerText = totalItems;
        document.getElementById('totalStock').innerText = totalStock;
        document.getElementById('branchCount').innerText = branches.size;
        document.getElementById('totalStockValue').innerText = '₦' + totalStockValue.toLocaleString();
    }

    // ==================== Return to Warehouse Modal ====================
    window.openReturnModal = function(id, itemName, branch, stock, unitPrice, category) {
        if (currentUserRole === 'admin' || currentUserRole === 'lagos_sender') {
            // allowed
        } else if (currentUserRole === 'abuja_rep' && branch === 'Abuja') {
            // allowed
        } else if (currentUserRole === 'ph_rep' && branch === 'Portharcourt') {
            // allowed
        } else {
            alert('You do not have permission to return items from this branch.');
            return;
        }

        if (stock <= 0) {
            alert('This item has no stock on the shop floor to return.');
            return;
        }
        returnItemData = { id, itemName, branch, stock, unitPrice, category: category || 'Other' };
        document.getElementById('returnItemName').innerText = itemName;
        document.getElementById('returnCurrentStock').innerText = stock;
        document.getElementById('returnUnitPrice').innerText = unitPrice.toLocaleString();
        document.getElementById('returnBranch').innerText = branch;
        document.getElementById('returnCategory').innerText = returnItemData.category;
        document.getElementById('returnQuantity').value = '';
        document.getElementById('returnReason').value = '';
        document.getElementById('returnMessage').innerText = '';
        document.getElementById('returnWarehouseModal').style.display = 'flex';
    };

    document.getElementById('returnConfirmBtn').addEventListener('click', async () => {
        const qty = parseInt(document.getElementById('returnQuantity').value);
        const reason = document.getElementById('returnReason').value.trim() || 'Defective goods';
        if (!qty || qty <= 0) {
            document.getElementById('returnMessage').innerText = 'Please enter a valid quantity.';
            return;
        }
        if (qty > returnItemData.stock) {
            document.getElementById('returnMessage').innerText = 'Insufficient stock on shop floor.';
            return;
        }

        try {
            // 1. Decrement shop floor inventory
            const floorRef = db.collection('shopFloor').doc(returnItemData.id);
            await floorRef.update({
                stock: firebase.firestore.FieldValue.increment(-qty),
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 2. Increment warehouse inventory (upsert)
            const warehouseRef = db.collection('inventory')
                .where('itemName', '==', returnItemData.itemName)
                .where('branch', '==', returnItemData.branch);
            const snap = await warehouseRef.get();
            if (snap.empty) {
                await db.collection('inventory').add({
                    itemName: returnItemData.itemName,
                    category: returnItemData.category,
                    branch: returnItemData.branch,
                    stock: qty,
                    unitPrice: returnItemData.unitPrice,
                    location: 'Shelf A',
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                snap.forEach(doc => {
                    doc.ref.update({
                        stock: firebase.firestore.FieldValue.increment(qty),
                        category: returnItemData.category,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }

            // 3. Log activity
            await db.collection('activityLog').add({
                actionType: 'return_to_warehouse',
                itemName: returnItemData.itemName,
                branch: returnItemData.branch,
                qty: qty,
                details: `Returned ${qty} x ${returnItemData.itemName} from shop floor to warehouse. Reason: ${reason}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                user: currentUserEmail
            });

            alert(`✅ Returned ${qty} x ${returnItemData.itemName} to warehouse.`);
            closeModal('returnWarehouseModal');
            // Refresh will happen via listener
        } catch (error) {
            console.error('Return to warehouse error:', error);
            document.getElementById('returnMessage').innerText = 'Error: ' + error.message;
        }
    });

    // ==================== Modal close ====================
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    };

    // ==================== Export CSV ====================
    function exportCSV(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return alert('No data to export.');
        let csv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td, th');
            const rowData = [];
            cols.forEach(col => rowData.push('"' + col.innerText.replace(/"/g, '""') + '"'));
            csv += rowData.join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `shop_floor_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    // ==================== Init ====================
    console.log('NEVAMAK Shop Floor loaded with search filters.');
</script>
</body>
</html>
