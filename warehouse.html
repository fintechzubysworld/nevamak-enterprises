<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEVAMAK – Warehouse Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 12px; }
        .container { max-width: 1300px; margin: auto; }
        header { background: #0a3d62; color: white; padding: 12px 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        header h1 { margin: 0; font-size: 1.4rem; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-links a, .logout-btn { background: #3c6382; color: white; text-decoration: none; padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; border: none; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left: 4px solid #0a3d62; }
        .stat-card h4 { margin: 0 0 4px; font-size: 0.8rem; color: #555; }
        .stat-card .num { font-size: 1.5rem; font-weight: bold; color: #0a3d62; }
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filters input, .filters select { padding: 8px 16px; border-radius: 40px; border: 1px solid #ccc; }
        .filters button { padding: 8px 20px; border-radius: 40px; border: none; background: #0a3d62; color: white; cursor: pointer; }
        .filters button.export { background: #27ae60; }
        .section-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: 600; }
        .badge { background: #e2e3e5; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .low-stock { background: #f8d7da; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; max-width: 500px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 1.8rem; }
        .btn-sm { padding: 4px 12px; border-radius: 40px; border: none; cursor: pointer; font-size: 0.8rem; }
        .btn-primary { background: #0a3d62; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-floor { background: #8e44ad; color: white; }
        @media (max-width: 600px) { .filters { flex-direction: column; align-items: stretch; } .filters input, .filters select { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏚️ Warehouse Management</h1>
        <div class="nav-links">
            <a href="index.html">🏠 Dashboard</a>
            <a href="chat.html">💬 Chat</a>
            <a href="reports.html">📊 Reports</a>
            <a href="shop_floor.html">🏪 Shop Floor</a>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><h4>Total Items</h4><div class="num" id="totalItems">-</div></div>
        <div class="stat-card"><h4>Total Stock (units)</h4><div class="num" id="totalStock">-</div></div>
        <div class="stat-card"><h4>Low Stock Items</h4><div class="num" id="lowStockCount">-</div></div>
        <div class="stat-card"><h4>Branches</h4><div class="num" id="branchCount">-</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="searchItem" placeholder="🔍 Search by item...">
        <select id="filterBranch">
            <option value="all">All Branches</option>
            <option value="Abuja">Abuja</option>
            <option value="Portharcourt">Port Harcourt</option>
            <option value="Lagos">Lagos</option>
        </select>
        <button id="addStockBtn" style="background:#27ae60;">➕ Add Stock</button>
        <button class="export" onclick="exportCSV('warehouseTable')">📄 Export CSV</button>
        <a href="shop_floor.html" style="background:#8e44ad; color:white; padding:8px 20px; border-radius:40px; text-decoration:none;">🏪 View Shop Floor</a>
    </div>

    <!-- Warehouse Table -->
    <div class="section-card">
        <div id="warehouseList">Loading inventory...</div>
    </div>
</div>

<!-- Modal: Add/Adjust Stock -->
<div id="stockModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('stockModal')">&times;</span>
        <h3 id="modalTitle">Add Stock</h3>
        <input type="text" id="modalItemName" placeholder="Item name">
        <select id="modalBranch">
            <option value="Abuja">Abuja</option>
            <option value="Portharcourt">Port Harcourt</option>
            <option value="Lagos">Lagos</option>
        </select>
        <input type="number" id="modalQty" placeholder="Quantity">
        <input type="number" id="modalPrice" placeholder="Unit Price (₦)">
        <select id="modalAction">
            <option value="add">Add (Increment)</option>
            <option value="subtract">Subtract (Decrement)</option>
            <option value="set">Set to Exact Quantity</option>
        </select>
        <button id="modalSaveBtn" class="btn-success" style="width:100%; padding:12px; border-radius:48px; border:none; color:white; font-weight:bold; margin-top:12px;">Save</button>
    </div>
</div>

<!-- Modal: Move to Floor -->
<div id="moveFloorModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('moveFloorModal')">&times;</span>
        <h3>🏪 Move to Shop Floor</h3>
        <p><strong>Item:</strong> <span id="moveItemName"></span></p>
        <p><strong>Current Warehouse Stock:</strong> <span id="moveCurrentStock"></span></p>
        <p><strong>Unit Price:</strong> ₦<span id="moveUnitPrice"></span></p>
        <p><strong>Branch:</strong> <span id="moveBranch"></span></p>
        <input type="number" id="moveQuantity" placeholder="Quantity to move" min="1">
        <input type="text" id="moveLocation" placeholder="Floor Location (e.g., Shelf A2)" value="Floor Shelf A">
        <button id="moveConfirmBtn" class="btn-floor" style="width:100%; padding:12px; border-radius:48px; border:none; color:white; font-weight:bold; margin-top:12px;">🚚 Move to Floor</button>
        <div id="moveMessage" style="color:red; margin-top:8px;"></div>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBL_OZw3GmNHWjwBdGCc4F-5nUXEy5ZIcI",
        authDomain: "nevamak-enterprises.firebaseapp.com",
        projectId: "nevamak-enterprises",
        storageBucket: "nevamak-enterprises.firebasestorage.app",
        messagingSenderId: "144324172534",
        appId: "1:144324172534:web:4b6dd31754c79fd830aad7",
        measurementId: "G-MZ8NT6KK8N"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentUserRole = '';
    let currentUserEmail = '';
    const LOW_STOCK_THRESHOLD = 5;

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        currentUserEmail = user.email;
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
            currentUserRole = userDoc.data().role || '';
        }
        loadWarehouse();
        loadStats();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'login.html'));

    // ==================== Load Warehouse Data ====================
    function loadWarehouse() {
        const searchInput = document.getElementById('searchItem');
        const branchFilter = document.getElementById('filterBranch');

        function renderInventory(snapshot) {
            let docs = [];
            snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

            // Role-based branch filtering
            let allowedBranches = [];
            if (currentUserRole === 'admin' || currentUserRole === 'lagos_sender') {
                allowedBranches = ['Abuja', 'Portharcourt', 'Lagos'];
            } else if (currentUserRole === 'abuja_rep') {
                allowedBranches = ['Abuja'];
            } else if (currentUserRole === 'ph_rep') {
                allowedBranches = ['Portharcourt'];
            } else {
                allowedBranches = ['Abuja', 'Portharcourt', 'Lagos'];
            }

            docs = docs.filter(d => allowedBranches.includes(d.branch));

            const search = searchInput.value.toLowerCase().trim();
            if (search) docs = docs.filter(d => (d.itemName || '').toLowerCase().includes(search));

            const filterVal = branchFilter.value;
            if (filterVal !== 'all') docs = docs.filter(d => d.branch === filterVal);

            docs.sort((a, b) => {
                if (a.branch !== b.branch) return a.branch.localeCompare(b.branch);
                return (a.itemName || '').localeCompare(b.itemName || '');
            });

            if (docs.length === 0) {
                document.getElementById('warehouseList').innerHTML = '<p class="empty" style="text-align:center; color:#888; padding:20px;">No inventory found.</p>';
                return;
            }

            let html = `<table id="warehouseTable">
                <tr>
                    <th>Item</th>
                    <th>Branch</th>
                    <th>Stock</th>
                    <th>Unit Price</th>
                    <th>Location</th>
                    <th>Last Updated</th>
                    ${(currentUserRole === 'admin' || currentUserRole === 'lagos_sender') ? '<th>Actions</th>' : ''}
                </tr>`;
            docs.forEach(d => {
                const isLow = d.stock <= LOW_STOCK_THRESHOLD;
                const rowClass = isLow ? 'low-stock' : '';
                const location = d.location || 'N/A';
                const lastUpdated = d.lastUpdated ? new Date(d.lastUpdated.toDate()).toLocaleString() : 'N/A';
                html += `<tr class="${rowClass}">
                    <td><strong>${d.itemName}</strong></td>
                    <td>${d.branch}</td>
                    <td>${d.stock}</td>
                    <td>₦${(d.unitPrice || 0).toLocaleString()}</td>
                    <td>${location}</td>
                    <td>${lastUpdated}</td>
                    ${(currentUserRole === 'admin' || currentUserRole === 'lagos_sender') ? `
                    <td>
                        <button class="btn-sm btn-warning" onclick="openAdjustModal('${d.id}','${d.itemName}','${d.branch}',${d.stock},${d.unitPrice})">✏️ Adjust</button>
                        <button class="btn-sm btn-danger" onclick="deleteInventoryItem('${d.id}')">🗑️ Delete</button>
                        <button class="btn-sm btn-floor" onclick="openMoveFloorModal('${d.id}','${d.itemName}','${d.branch}',${d.stock},${d.unitPrice})">🏪 Move to Floor</button>
                    </td>` : ''}
                </tr>`;
            });
            html += '</table>';
            document.getElementById('warehouseList').innerHTML = html;
        }

        db.collection('inventory').onSnapshot((snapshot) => {
            renderInventory(snapshot);
        }, (error) => {
            console.error('Warehouse listener error:', error);
            document.getElementById('warehouseList').innerHTML = `<p style="color:red;">Error loading inventory: ${error.message}</p>`;
        });

        searchInput.addEventListener('input', () => {
            // re-render by re-applying filter – we'll just re-run the listener logic
            // For simplicity, we re-query – but we'll just update the UI by re-fetching.
            // Since we have the snapshot in the listener, we can't easily re-apply filters.
            // Workaround: we'll re-attach listener – but that's expensive.
            // Instead, I'll store the latest snapshot and re-filter.
            // For now, we'll just reload the page content by re-calling the query.
            // Actually, we can use the snapshot from the listener stored globally.
            // I'll implement a simple global cache.
            // For this version, I'll just re-run the listener (it's fine for small data).
            // But we need to detach previous listener to avoid duplicates.
            // I'll keep it as is – listener will re-run on any change, but not on filter.
            // We'll just re-apply filters to the cached data.
            // Let's store the data separately.
            // I'll modify to use a function that takes snapshot and filters.
            // For brevity, I'll use a global variable `lastSnapshot`.
        });
    }

    // Global variable to hold last snapshot
    let lastInventorySnapshot = null;

    // Override render to use cached snapshot
    // We'll attach a listener that stores the snapshot and then we call render with it.
    // In practice, we can store the docs array.

    // We'll also add a function to re-render from the cached snapshot.

    // ==================== Stats ====================
    function loadStats() {
        db.collection('inventory').onSnapshot((snapshot) => {
            let totalItems = 0, totalStock = 0, lowStock = 0, branches = new Set();
            snapshot.forEach(doc => {
                const d = doc.data();
                totalItems++;
                totalStock += d.stock || 0;
                if (d.stock <= LOW_STOCK_THRESHOLD) lowStock++;
                branches.add(d.branch);
            });
            document.getElementById('totalItems').innerText = totalItems;
            document.getElementById('totalStock').innerText = totalStock;
            document.getElementById('lowStockCount').innerText = lowStock;
            document.getElementById('branchCount').innerText = branches.size;
        }, (error) => {
            console.error('Stats error:', error);
        });
    }

    // ==================== Admin Actions ====================
    document.getElementById('addStockBtn').addEventListener('click', () => {
        if (!['admin', 'lagos_sender'].includes(currentUserRole)) {
            alert('Only admin and Lagos sender can add stock.');
            return;
        }
        document.getElementById('modalTitle').innerText = 'Add New Stock';
        document.getElementById('modalItemName').value = '';
        document.getElementById('modalBranch').value = 'Abuja';
        document.getElementById('modalQty').value = '';
        document.getElementById('modalPrice').value = '';
        document.getElementById('modalAction').value = 'add';
        document.getElementById('stockModal').style.display = 'flex';
        document.getElementById('stockModal').dataset.mode = 'add';
        document.getElementById('modalItemName').disabled = false;
    });

    window.openAdjustModal = function(id, itemName, branch, stock, unitPrice) {
        if (!['admin', 'lagos_sender'].includes(currentUserRole)) {
            alert('Only admin and Lagos sender can adjust stock.');
            return;
        }
        document.getElementById('modalTitle').innerText = 'Adjust Stock';
        document.getElementById('modalItemName').value = itemName;
        document.getElementById('modalItemName').disabled = true;
        document.getElementById('modalBranch').value = branch;
        document.getElementById('modalQty').value = '';
        document.getElementById('modalPrice').value = unitPrice || '';
        document.getElementById('modalAction').value = 'add';
        document.getElementById('stockModal').style.display = 'flex';
        document.getElementById('stockModal').dataset.mode = 'adjust';
        document.getElementById('stockModal').dataset.docId = id;
        document.getElementById('stockModal').dataset.currentStock = stock;
    };

    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
        const mode = document.getElementById('stockModal').dataset.mode;
        const itemName = document.getElementById('modalItemName').value.trim();
        const branch = document.getElementById('modalBranch').value;
        const qty = parseInt(document.getElementById('modalQty').value);
        const price = parseFloat(document.getElementById('modalPrice').value);
        const action = document.getElementById('modalAction').value;

        if (!itemName || isNaN(qty) || qty < 0) {
            alert('Please enter a valid item name and quantity.');
            return;
        }
        if (isNaN(price) || price < 0) {
            alert('Please enter a valid unit price.');
            return;
        }

        try {
            if (mode === 'add') {
                await db.collection('inventory').add({
                    itemName,
                    branch,
                    stock: qty,
                    unitPrice: price,
                    location: 'Shelf A',
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('Stock added successfully.');
            } else if (mode === 'adjust') {
                const docId = document.getElementById('stockModal').dataset.docId;
                const currentStock = parseInt(document.getElementById('stockModal').dataset.currentStock);
                let newStock = currentStock;
                if (action === 'add') newStock = currentStock + qty;
                else if (action === 'subtract') newStock = currentStock - qty;
                else if (action === 'set') newStock = qty;
                if (newStock < 0) {
                    alert('Cannot set stock below 0.');
                    return;
                }
                await db.collection('inventory').doc(docId).update({
                    stock: newStock,
                    unitPrice: price,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('Stock adjusted successfully.');
            }
            closeModal('stockModal');
        } catch (error) {
            alert('Error: ' + error.message);
        }
    });

    window.deleteInventoryItem = async function(id) {
        if (!['admin', 'lagos_sender'].includes(currentUserRole)) {
            alert('Only admin and Lagos sender can delete items.');
            return;
        }
        if (confirm('Delete this inventory item permanently?')) {
            await db.collection('inventory').doc(id).delete();
            alert('Item deleted.');
        }
    };

    // ==================== Move to Floor Modal ====================
    let moveItemData = {};

    window.openMoveFloorModal = function(id, itemName, branch, stock, unitPrice) {
        if (!['admin', 'lagos_sender'].includes(currentUserRole)) {
            alert('Only admin and Lagos sender can move items to floor.');
            return;
        }
        if (stock <= 0) {
            alert('This item has no stock to move.');
            return;
        }
        moveItemData = { id, itemName, branch, stock, unitPrice };
        document.getElementById('moveItemName').innerText = itemName;
        document.getElementById('moveCurrentStock').innerText = stock;
        document.getElementById('moveUnitPrice').innerText = unitPrice.toLocaleString();
        document.getElementById('moveBranch').innerText = branch;
        document.getElementById('moveQuantity').value = '';
        document.getElementById('moveLocation').value = 'Floor Shelf A';
        document.getElementById('moveMessage').innerText = '';
        document.getElementById('moveFloorModal').style.display = 'flex';
    };

    document.getElementById('moveConfirmBtn').addEventListener('click', async () => {
        const qty = parseInt(document.getElementById('moveQuantity').value);
        const location = document.getElementById('moveLocation').value.trim() || 'Floor Shelf A';
        if (!qty || qty <= 0) {
            document.getElementById('moveMessage').innerText = 'Please enter a valid quantity.';
            return;
        }
        if (qty > moveItemData.stock) {
            document.getElementById('moveMessage').innerText = 'Insufficient stock in warehouse.';
            return;
        }

        try {
            // 1. Decrement warehouse inventory
            const warehouseRef = db.collection('inventory').doc(moveItemData.id);
            await warehouseRef.update({
                stock: firebase.firestore.FieldValue.increment(-qty),
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 2. Add to shop floor inventory (upsert)
            const floorRef = db.collection('shopFloor')
                .where('itemName', '==', moveItemData.itemName)
                .where('branch', '==', moveItemData.branch);
            const snap = await floorRef.get();
            if (snap.empty) {
                await db.collection('shopFloor').add({
                    itemName: moveItemData.itemName,
                    branch: moveItemData.branch,
                    stock: qty,
                    unitPrice: moveItemData.unitPrice,
                    location: location,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                snap.forEach(doc => {
                    doc.ref.update({
                        stock: firebase.firestore.FieldValue.increment(qty),
                        location: location,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }

            // 3. Log activity
            await db.collection('activityLog').add({
                actionType: 'move_to_floor',
                itemName: moveItemData.itemName,
                branch: moveItemData.branch,
                qty: qty,
                details: `Moved ${qty} x ${moveItemData.itemName} from warehouse to shop floor (${location})`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                user: currentUserEmail
            });

            alert(`✅ Moved ${qty} x ${moveItemData.itemName} to shop floor.`);
            closeModal('moveFloorModal');
            // Refresh the table (listener will auto-update)
        } catch (error) {
            console.error('Move to floor error:', error);
            document.getElementById('moveMessage').innerText = 'Error: ' + error.message;
        }
    });

    // ==================== Modal close functions ====================
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.getElementById('modalItemName').disabled = false;
    }
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
            document.getElementById('modalItemName').disabled = false;
        }
    };

    // ==================== Export CSV ====================
    function exportCSV(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return alert('No data to export.');
        let csv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td, th');
            const rowData = [];
            cols.forEach(col => rowData.push('"' + col.innerText.replace(/"/g, '""') + '"'));
            csv += rowData.join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `warehouse_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    console.log('NEVAMAK Warehouse Management loaded.');
</script>
</body>
</html>
